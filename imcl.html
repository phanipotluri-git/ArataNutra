<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>IMC Bengal — Fish Health Guide</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=IBM+Plex+Sans:wght@400;600;700&family=Hind+Siliguri:wght@400;600;700&family=Noto+Sans+Telugu:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#060d18;--panel:#0c1628;--p2:#091430;--bd:#1a3060;
  --teal:#12c4d0;--gold:#e6b020;--red:#f06060;--orange:#f08840;
  --green:#44d488;--purple:#9b6cff;--sky:#48ccff;--pink:#ff7ab0;
  --txt:#ddeeff;--mid:#8ab2cc;--dim:#4a7090;
}
html,body{background:#060d18;overflow-x:hidden;color:var(--txt);font-size:14px;line-height:1.5}
body.L-en{font-family:'IBM Plex Sans',sans-serif}
body.L-bn{font-family:'Hind Siliguri',sans-serif}
body.L-te{font-family:'Noto Sans Telugu',sans-serif}
*{box-sizing:border-box;margin:0;padding:0}

/* TOPBAR */
#bar{background:var(–panel);border-bottom:2px solid var(–teal);padding:10px 12px 9px}
.r1{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.logo{font-family:‘IBM Plex Mono’,monospace;font-size:11px;font-weight:700;letter-spacing:2px;color:var(–teal);text-transform:uppercase}
.logo span{color:var(–dim);font-weight:400}
.lps{display:flex;background:var(–p2);border:1px solid var(–bd);border-radius:20px;padding:2px;gap:2px}
.lb{padding:4px 12px;border-radius:18px;border:none;background:transparent;cursor:pointer;font-size:13px;font-weight:700;color:var(–dim)}
.lb.on{background:var(–teal);color:#000}
.lb[data-l=“te”].on{background:var(–purple);color:#fff}
#srch{width:100%;background:var(–p2);border:1px solid var(–bd);border-radius:8px;padding:7px 12px 7px 34px;color:var(–txt);font-size:14px;outline:none;-webkit-appearance:none}
#srch::placeholder{color:var(–dim)}
.sw{position:relative}
.si{position:absolute;left:10px;top:50%;transform:translateY(-50%);font-size:14px;pointer-events:none}

/* INFO STRIP */
#strip{background:var(–p2);border-bottom:1px solid var(–bd);padding:7px 14px;font-size:11px;color:var(–dim);font-family:‘IBM Plex Mono’,monospace;letter-spacing:.5px;display:flex;align-items:center;gap:8px}
#strip-icon{font-size:14px}

/* CARD LIST */
#list{padding:10px 12px 80px;min-height:200px}
.card{display:flex;align-items:center;gap:10px;background:var(–panel);border:1px solid var(–bd);border-left:3px solid var(–teal);border-radius:10px;margin-bottom:9px;padding:11px 12px;cursor:pointer;-webkit-tap-highlight-color:transparent}
.card:active{opacity:.7}
.ci{font-size:22px;flex-shrink:0;width:32px;text-align:center}
.cb{flex:1;min-width:0}
.ct{font-size:13px;font-weight:700;color:var(–txt);line-height:1.3;margin-bottom:2px}
.cs{font-size:11px;color:var(–dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:4px}
.ctg{display:flex;gap:3px;flex-wrap:wrap}
.tg{font-family:‘IBM Plex Mono’,monospace;font-size:8px;letter-spacing:.5px;text-transform:uppercase;padding:1px 5px;border-radius:3px;font-weight:700}
.ca{color:var(–dim);font-size:18px;flex-shrink:0}
/* card accents */
.ac-red{border-left-color:var(–red)}.ac-orange{border-left-color:var(–orange)}
.ac-purple{border-left-color:var(–purple)}.ac-teal{border-left-color:var(–teal)}
.ac-sky{border-left-color:var(–sky)}.ac-green{border-left-color:var(–green)}
.ac-gold{border-left-color:var(–gold)}.ac-pink{border-left-color:var(–pink)}
/* tag colours */
.tk{background:rgba(240,96,96,.2);color:#ff8080}
.tb2{background:rgba(240,144,64,.15);color:#ffb070}
.tp{background:rgba(155,108,255,.15);color:#c090ff}
.tw{background:rgba(18,196,208,.12);color:var(–teal)}
.tf{background:rgba(232,176,32,.12);color:var(–gold)}
.tg2{background:rgba(68,212,136,.12);color:var(–green)}
.te2{background:rgba(72,204,255,.12);color:var(–sky)}
#nores{display:none;text-align:center;padding:60px 20px;color:var(–dim);font-size:13px}

/* DETAIL PANEL — display:none default, @keyframes on open */
@keyframes slideIn{from{transform:translateX(100%)}to{transform:translateX(0)}}
#det{display:none;position:fixed;top:0;left:0;width:100%;height:100%;z-index:9999;background:#060d18;flex-direction:column;overflow:hidden}
#det.open{display:flex;animation:slideIn .25s ease-out forwards}
#dh{background:var(–panel);border-bottom:2px solid var(–teal);padding:12px 14px 10px;flex-shrink:0}
#back{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(–teal);font-size:14px;font-weight:700;cursor:pointer;padding:0;margin-bottom:8px}
#dico{font-size:26px;margin-bottom:3px}
#dtit{font-size:16px;font-weight:700;line-height:1.3;color:var(–txt)}
#dsub{font-size:10px;color:var(–dim);margin-top:2px;font-family:‘IBM Plex Mono’,monospace;letter-spacing:.5px}
#dscr{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:14px 14px 80px}
#dbody{}

/* DETAIL CONTENT — converted from original IMC CSS */
.cause{background:rgba(18,196,208,.05);border:1px solid rgba(18,196,208,.14);border-radius:6px;padding:9px 11px;margin-bottom:8px;font-size:12px;color:var(–mid);line-height:1.6}
.cause strong{color:var(–txt);font-size:11px;font-family:‘IBM Plex Mono’,monospace;text-transform:uppercase;letter-spacing:1px}
.symp{background:var(–p2);border-radius:6px;padding:9px 11px;margin-bottom:8px;font-size:12px;color:var(–mid);line-height:1.6}
.symp-head{display:block;font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–dim);text-transform:uppercase;margin-bottom:5px}
.step{font-family:‘IBM Plex Mono’,monospace;font-size:9px;letter-spacing:2px;color:var(–teal);text-transform:uppercase;border-bottom:1px solid rgba(26,48,96,.5);padding-bottom:3px;margin:10px 0 6px}
.dl{list-style:none;display:flex;flex-direction:column;gap:5px;margin:0;padding:0}
.dl li{display:flex;align-items:baseline;gap:6px;font-size:12px;line-height:1.5;padding:5px 9px;background:var(–p2);border-radius:6px}
.dlc{flex:1;color:var(–txt);font-weight:600}
.dlq{font-family:‘IBM Plex Mono’,monospace;font-size:9px;color:var(–gold);background:rgba(230,176,32,.08);border-radius:4px;padding:2px 6px;white-space:nowrap;flex-shrink:0}
.dln{font-size:10px;color:var(–dim);display:block;margin-top:2px;font-style:italic;padding-left:4px}
.iw{background:#1e1000;border:1px solid #a05010;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffd060;margin-top:8px;margin-bottom:8px}
.ib{background:#180000;border:1px solid #901020;border-radius:6px;padding:7px 10px;font-size:12px;color:#ffb0b0;margin-top:8px;margin-bottom:8px}
.it{background:rgba(18,196,208,.07);border:1px solid rgba(18,196,208,.25);border-radius:6px;padding:7px 10px;font-size:12px;color:#78d8e0;margin-top:8px;margin-bottom:8px}
.bh{font-family:‘IBM Plex Mono’,monospace;font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;display:inline-block;margin-right:4px}
.iw .bh{color:var(–gold)}.ib .bh{color:var(–red)}.it .bh{color:var(–teal)}
</style>

</head>

</div>

<script>
var D = [
{
  id:'eus', icon:'🔴', ac:'ac-red',
  tags:[{c:'tk',t:{en:'CRITICAL · BENGAL',bn:'সংকটজনক',te:'చాలా ప్రమాదకరం'}}],
  title:{en:'EUS — Epizootic Ulcerative Syndrome',bn:'ইইউএস — ক্ষত মহামারী রোগ',te:'EUS — చేపలకు పుళ్ళు వచ్చే రోగం'},
  sub:{en:"Aphanomyces invadans · Bengal's #1 killer · Oct–Feb",bn:'অ্যাফানোমাইসেস ইনভেডানস · বাংলার সবচেয়ে বিপজ্জনক',te:'ఒక రకం శిలీంధ్ర జీవి · అక్టోబర్–ఫిబ్రవరి'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Aphanomyces invadans (oomycete). Bengal's #1 seasonal killer. Peaks Oct–Feb when water temp drops below 25°C. Mrigal &gt; Catla &gt; Rohu susceptibility.</div><div class='symp'><span class='symp-head'>Symptoms</span>Small red spots → large coin-sized grey-centred necrotic ulcers on head, dorsal &amp; mid-body. Fish spin erratically &amp; surface frequently. High mortality if untreated.</div><div class='step'>Prevention — Apply at start of October</div><ul class='dl'><li><span class='dlc'>CIFAX (ICAR-CIFA formulation)</span><span class='dlq'>150 ml / bigha</span></li><li><span class='dlc'>Potassium Permanganate (KMnO₄)</span><span class='dlq'>350–600 g / bigha</span></li><li><span class='dlc'>Agricultural Lime — Ca(OH)₂</span><span class='dlq'>15–25 kg / bigha</span><span class='dln'>Raise pH ≥7.5 to inhibit Aphanomyces. Apply fortnightly Oct–Feb.</span></li></ul><div class='step'>Active Outbreak Treatment</div><ul class='dl'><li><span class='dlc'>Potassium Permanganate (KMnO₄) bath</span><span class='dlq'>10–15 mg/L · 30 min</span></li><li><span class='dlc'>CIFAX pond treatment</span><span class='dlq'>250 ml / bigha · repeat in 7 days</span></li><li><span class='dlc'>NaCl salt bath</span><span class='dlq'>10 g/L · 10 min</span></li><li><span class='dlc'>Oxytetracycline in feed</span><span class='dlq'>50–75 mg/kg fish/day · 10 days</span><span class='dln'>Only under veterinary prescription. Prevents secondary bacterial infection.</span></li></ul><div class='iw'><span class='bh'>⚠ Season Alert</span>EUS can wipe out 60–80% of stock in 2 weeks if untreated. Begin prevention lime application in September before temperatures drop.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> অ্যাফানোমাইসেস ইনভেডানস (ওমাইসেট)। বাংলার সবচেয়ে বিপজ্জনক মৌসুমী রোগ। অক্টোবর–ফেব্রুয়ারিতে জলের তাপমাত্রা ২৫°C-এর নিচে নামলে সবচেয়ে বেশি হয়।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ছোট লাল দাগ → মাথা, পিঠ ও শরীরের মাঝখানে বড় ধূসর কেন্দ্রযুক্ত ঘা। মাছ এলোমেলোভাবে ঘোরে ও ঘন ঘন উপরে আসে। চিকিৎসা না করলে মৃত্যুহার বেশি।</div><div class='step'>প্রতিরোধ — অক্টোবরের শুরুতে প্রয়োগ করুন</div><ul class='dl'><li><span class='dlc'>CIFAX (ICAR-CIFA প্রণালী)</span><span class='dlq'>১৫০ মিলি / বিঘা</span></li><li><span class='dlc'>পটাশিয়াম পারম্যাঙ্গানেট (KMnO₄)</span><span class='dlq'>৩৫০–৬০০ গ্রা / বিঘা</span></li><li><span class='dlc'>কৃষি চুন — Ca(OH)₂</span><span class='dlq'>১৫–২৫ কেজি / বিঘা</span><span class='dln'>pH ≥৭.৫ করুন — অ্যাফানোমাইসেস বাধা পায়। অক্টোবর–ফেব্রুয়ারি পক্ষকালে প্রয়োগ।</span></li></ul><div class='step'>সক্রিয় সংক্রমণের চিকিৎসা</div><ul class='dl'><li><span class='dlc'>KMnO₄ স্নান</span><span class='dlq'>১০–১৫ মি.গ্রা/লি · ৩০ মিনিট</span></li><li><span class='dlc'>CIFAX পুকুরে প্রয়োগ</span><span class='dlq'>২৫০ মিলি / বিঘা · ৭ দিন পর আবার</span></li><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>১০ গ্রা/লি · ১০ মিনিট</span></li><li><span class='dlc'>অক্সিটেট্রাসাইক্লিন খাবারে</span><span class='dlq'>৫০–৭৫ মি.গ্রা/কেজি মাছ/দিন · ১০ দিন</span><span class='dln'>শুধু পশু চিকিৎসকের পরামর্শে। গৌণ ব্যাকটেরিয়া সংক্রমণ প্রতিরোধ করে।</span></li></ul><div class='iw'><span class='bh'>⚠ মৌসুম সতর্কতা</span>চিকিৎসা না করলে EUS ২ সপ্তাহে ৬০–৮০% মাছ মেরে ফেলতে পারে। সেপ্টেম্বরেই চুন দিন।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> అఫానోమైసెస్ ఇన్‌వేడాన్స్ అనే శిలీంధ్ర జీవి వల్ల వస్తుంది. బెంగాల్ జోన్‌లో #1 మారణ రోగం. అక్టోబర్–ఫిబ్రవరిలో నీటి ఉష్ణోగ్రత 25°C కంటే తక్కువ అయినప్పుడు ఎక్కువగా వస్తుంది.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>చిన్న ఎర్రని మచ్చలు → తల, వెన్ను, శరీరం మధ్య పెద్ద బూడిద రంగు పుళ్ళు. చేపలు అటూఇటూ తిరుగుతాయి, పైకి వస్తాయి. చికిత్స లేకుంటే చాలా చేపలు చనిపోతాయి.</div><div class='step'>నివారణ — అక్టోబర్ మొదట్లో వేయండి</div><ul class='dl'><li><span class='dlc'>CIFAX (ICAR-CIFA మందు)</span><span class='dlq'>150 ml / బిఘా</span></li><li><span class='dlc'>పొటాషియం పర్మాంగనేట్ (KMnO₄)</span><span class='dlq'>350–600 గ్రా / బిఘా</span></li><li><span class='dlc'>వ్యవసాయ సున్నం — Ca(OH)₂</span><span class='dlq'>15–25 కి.గ్రా / బిఘా</span><span class='dln'>pH ≥7.5 చేయండి — అఫానోమైసెస్ పెరగకుండా ఆపుతుంది. అక్టోబర్–ఫిబ్రవరి పక్షానికోసారి వేయండి.</span></li></ul><div class='step'>చురుకైన వ్యాప్తి చికిత్స</div><ul class='dl'><li><span class='dlc'>KMnO₄ స్నానం</span><span class='dlq'>10–15 mg/L · 30 నిమిషాలు</span></li><li><span class='dlc'>CIFAX చెరువులో</span><span class='dlq'>250 ml / బిఘా · 7 రోజుల తర్వాత మళ్ళీ</span></li><li><span class='dlc'>NaCl ఉప్పు స్నానం</span><span class='dlq'>10 g/L · 10 నిమిషాలు</span></li><li><span class='dlc'>ఆహారంలో ఆక్సీటెట్రాసైక్లిన్</span><span class='dlq'>50–75 mg/kg చేప/రోజు · 10 రోజులు</span><span class='dln'>పశువైద్యుని సూచన మేరకు మాత్రమే. ద్వితీయ బాక్టీరియా సంక్రమణ నివారిస్తుంది.</span></li></ul><div class='iw'><span class='bh'>⚠ మరొక హెచ్చరిక</span>చికిత్స లేకుంటే EUS 2 వారాల్లో 60–80% చేపలను చంపగలదు. సెప్టెంబర్‌లోనే సున్నం వేయండి.</div>`
},
{
  id:'bact_ulcer', icon:'🩸', ac:'ac-red',
  tags:[{c:'tb2',t:{en:'BACTERIAL',bn:'ব্যাকটেরিয়া',te:'బాక్టీరియా'}}],
  title:{en:'Bacterial Ulcers & Hemorrhagic Septicaemia',bn:'ব্যাকটেরিয়াজনিত ক্ষত ও রক্তক্ষরণ পচন রোগ',te:'బాక్టీరియా వల్ల వచ్చే పుళ్ళు, రక్తం కారడం'},
  sub:{en:'Aeromonas hydrophila · Secondary to EUS or injury',bn:'অ্যারোমোনাস হাইড্রোফিলা · EUS-পরবর্তী বা আঘাতের পরে',te:'EUS తర్వాత లేదా చేపకు దెబ్బ తగిలినప్పుడు'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Aeromonas hydrophila, A. sobria, Pseudomonas spp. Often secondary to EUS ulcers, crowding stress, or poor water quality. Haemorrhagic septicaemia = bacteria enter bloodstream and cause systemic bleeding.</div><div class='symp'><span class='symp-head'>Symptoms</span>Skin ulcers with red-rimmed edges and pale/white centres. Haemorrhagic patches (red blotches) on skin, fins, around vent. Fin erosion. Abdominal swelling (dropsy stage). Pop-eye (exophthalmia) in severe cases.</div><div class='step'>Water Disinfection</div><ul class='dl'><li><span class='dlc'>BKC 80% (Benzalkonium Chloride)</span><span class='dlq'>500 ml / acre</span><span class='dln'>Primary bactericide for Aeromonas. Apply morning. Broad-spectrum — kills bacteria, fungi, viruses in water column.</span></li><li><span class='dlc'>Acriflavine</span><span class='dlq'>25 g / acre</span></li><li><span class='dlc'>KMnO₄ pond treatment</span><span class='dlq'>2–4 mg/L · whole pond</span></li><li><span class='dlc'>Lime Ca(OH)₂ + Crystal Salt</span><span class='dlq'>50 + 50 kg / acre · every 10–15 days</span></li></ul><div class='step'>Post-Antibiotic Recovery</div><ul class='dl'><li><span class='dlc'>Steridol 20% — morning</span><span class='dlq'>500 ml / acre</span></li><li><span class='dlc'>BKC 80% — evening (alternate with Steridol)</span><span class='dlq'>500 ml / acre</span><span class='dln'>Targets residual Aeromonas during fish recovery phase.</span></li><li><span class='dlc'>Fish Magic / Liver Tonic — mandatory</span><span class='dlq'>1–2 kg / ton feed · 10–15 days</span><span class='dln'>All antibiotic/chemical use hardens liver. Liver support after every course — no exceptions.</span></li></ul><div class='step'>Prevention</div><ul class='dl'><li><span class='dlc'>Maintain DO &gt;5 mg/L at all times</span><span class='dlq'>Aeromonas thrives in low DO</span></li><li><span class='dlc'>Reduce stocking density during monsoon</span><span class='dlq'>&lt;5000 fish/bigha</span></li><li><span class='dlc'>Fortnightly lime application</span><span class='dlq'>8–10 kg / bigha</span></li></ul>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> অ্যারোমোনাস হাইড্রোফিলা, এ. সোব্রিয়া, সিউডোমোনাস। প্রায়ই EUS ক্ষতের পরে বা ঘন মজুদ ও খারাপ জলমানে সেকেন্ডারি সংক্রমণ। হেমোরেজিক সেপ্টিসেমিয়া = ব্যাকটেরিয়া রক্তে ঢুকে সারা শরীরে ছড়ায়।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>লাল প্রান্তযুক্ত ও ফ্যাকাশে কেন্দ্রের ত্বকের ক্ষত। ত্বকে, পাখনায় ও পায়ুর কাছে রক্তক্ষরণের দাগ। পাখনা ক্ষয়। পেট ফোলা। গুরুতর ক্ষেত্রে চোখ বেরিয়ে আসা।</div><div class='step'>জল জীবাণুমুক্তকরণ</div><ul class='dl'><li><span class='dlc'>বিকেসি ৮০% (বেনজালকোনিয়াম ক্লোরাইড)</span><span class='dlq'>৫০০ মিলি / একর</span><span class='dln'>অ্যারোমোনাসের বিরুদ্ধে প্রধান জীবাণুনাশক। সকালে দিন।</span></li><li><span class='dlc'>অ্যাক্রিফ্লেভিন</span><span class='dlq'>২৫ গ্রাম / একর</span></li><li><span class='dlc'>KMnO₄ পুকুরে প্রয়োগ</span><span class='dlq'>২–৪ মি.গ্রা/লি · পুরো পুকুর</span></li><li><span class='dlc'>চুন Ca(OH)₂ + ক্রিস্টাল লবণ</span><span class='dlq'>৫০ + ৫০ কেজি / একর · প্রতি ১০–১৫ দিনে</span></li></ul><div class='step'>অ্যান্টিবায়োটিক পরবর্তী পুনরুদ্ধার</div><ul class='dl'><li><span class='dlc'>স্টেরিডল ২০% — সকালে</span><span class='dlq'>৫০০ মিলি / একর</span></li><li><span class='dlc'>বিকেসি ৮০% — সন্ধ্যায় (স্টেরিডলের সাথে পর্যায়ক্রমে)</span><span class='dlq'>৫০০ মিলি / একর</span><span class='dln'>মাছের সুস্থ হওয়ার সময়ে অবশিষ্ট অ্যারোমোনাসকে নিয়ন্ত্রণ করে।</span></li><li><span class='dlc'>ফিশ ম্যাজিক / লিভার টনিক — অবশ্যই দিন</span><span class='dlq'>১–২ কেজি / টন খাবার · ১০–১৫ দিন</span><span class='dln'>সব ওষুধ মাছের যকৃত শক্ত করে। প্রতিটি কোর্সের পরে যকৃত সহায়ক খাদ্য দিন।</span></li></ul><div class='step'>প্রতিরোধ</div><ul class='dl'><li><span class='dlc'>সর্বদা DO &gt;৫ মি.গ্রা/লি বজায় রাখুন</span><span class='dlq'>অ্যারোমোনাস কম অক্সিজেনে বাড়ে</span></li><li><span class='dlc'>বর্ষায় মজুদ কমান</span><span class='dlq'>&lt;৫০০০ মাছ/বিঘা</span></li><li><span class='dlc'>পক্ষকালে চুন দিন</span><span class='dlq'>৮–১০ কেজি / বিঘা</span></li></ul>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> అరోమోనాస్ హైడ్రోఫిలా, సూడోమోనాస్ జాతి బాక్టీరియా వల్ల వస్తుంది. తరచుగా EUS పుళ్ళ తర్వాత లేదా నీరు పాడైనప్పుడు వస్తుంది. హెమోరేజిక్ సెప్టిసెమియా = బాక్టీరియా రక్తంలోకి చేరి శరీరంలో రక్తస్రావం కలిగిస్తుంది.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>ఎర్రని అంచులతో లేత మధ్యభాగం ఉన్న చర్మ పుళ్ళు. చర్మంపై, రెక్కలపై, పాయువు చుట్టూ రక్తస్రావపు మచ్చలు. రెక్కలు అరిగిపోవడం. పొట్ట వాపు. తీవ్ర స్థితిలో కళ్ళు బయటకు వస్తాయి.</div><div class='step'>పుకురులో మందు వేయండి</div><ul class='dl'><li><span class='dlc'>BKC 80% (బెంజల్‌కోనియమ్ క్లోరైడ్)</span><span class='dlq'>500 ml / ఎకరా</span><span class='dln'>అరోమోనాస్ కు ప్రధాన జీవాణుసంహారి. ఉదయం వేయండి.</span></li><li><span class='dlc'>అక్రిఫ్లేవిన్</span><span class='dlq'>25 గ్రా / ఎకరా</span></li><li><span class='dlc'>KMnO₄ చెరువులో</span><span class='dlq'>2–4 mg/L · మొత్తం చెరువు</span></li><li><span class='dlc'>సున్నం Ca(OH)₂ + ఉప్పు</span><span class='dlq'>50 + 50 కేజీ / ఎకరా · 10–15 రోజులకోసారి</span></li></ul><div class='step'>యాంటీబయాటిక్ కోర్సు తర్వాత</div><ul class='dl'><li><span class='dlc'>Steridol 20% — ఉదయం</span><span class='dlq'>500 ml / ఎకరా</span></li><li><span class='dlc'>BKC 80% — సాయంత్రం (Steridol తో వారుసగా)</span><span class='dlq'>500 ml / ఎకరా</span><span class='dln'>చేప కోలుకునే సమయంలో నీటిలో మిగిలిన అరోమోనాసును తొలగిస్తుంది.</span></li><li><span class='dlc'>Fish Magic / లివర్ టానిక్ — తప్పనిసరి</span><span class='dlq'>1–2 కేజీ / టన్ మేత · 10–15 రోజులు</span><span class='dln'>మందు వేసిన తర్వాత చేప కాలేయం దెబ్బతింటుంది. ప్రతి కోర్సు తర్వాత ఇవ్వాలి.</span></li></ul><div class='step'>నివారణ</div><ul class='dl'><li><span class='dlc'>DO &gt;5 mg/L నిర్వహించండి</span><span class='dlq'>అరోమోనాస్ తక్కువ DO లో పెరుగుతుంది</span></li><li><span class='dlc'>వర్షాకాలంలో సాంద్రత తగ్గించండి</span><span class='dlq'>&lt;5000 చేపలు/బిఘా</span></li><li><span class='dlc'>పక్షానికోసారి సున్నం</span><span class='dlq'>8–10 కి.గ్రా / బిఘా</span></li></ul>`
},
{
  id:'tail_fin_rot', icon:'🐟', ac:'ac-orange',
  tags:[{c:'tb2',t:{en:'BACTERIAL',bn:'ব্যাকটেরিয়া',te:'బాక్టీరియా'}}],
  title:{en:'Tail & Fin Rot (Columnaris)',bn:'লেজ ও পাখনা পচা রোগ',te:'తోక, రెక్కలు కుళ్ళే రోగం'},
  sub:{en:'Flavobacterium columnare · Poor water quality trigger',bn:'ফ্ল্যাভোব্যাকটেরিয়াম · খারাপ জলমানে হয়',te:'నీరు పాడైనప్పుడు లేదా ఎక్కువ చేపలు ఉన్నప్పుడు'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Flavobacterium columnare, Aeromonas spp. Triggered by poor water quality, overcrowding, or mechanical injury. Very common in monsoon season and winter.</div><div class='symp'><span class='symp-head'>Symptoms</span>Fraying and erosion of tail and fins. White/yellow cottony growth at fin edges. Fins appear ragged and shorter. In severe cases, fin base becomes red and ulcerated. Can reach body if untreated.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>Steridol 20% — morning</span><span class='dlq'>500 ml / acre</span></li><li><span class='dlc'>BKC 80% — evening (alternate with Steridol)</span><span class='dlq'>500 ml / acre</span><span class='dln'>Primary pond disinfectant for Flavobacterium columnare — more effective than KMnO₄ for Columnaris.</span></li><li><span class='dlc'>Acriflavine</span><span class='dlq'>25 g / acre</span></li><li><span class='dlc'>KMnO₄ dip — fish before releasing after netting</span><span class='dlq'>1 ppm · 1 min</span><span class='dln'>For secondary Aeromonas wound infection only — not for Columnaris. Do not use as pond treatment for Columnaris.</span></li><li><span class='dlc'>Check phosphorus — pond water</span><span class='dlq'>Target &lt;0.5 mg/L</span><span class='dln'>Excess phosphorus fuels bacterial growth. Reduce manure/fertiliser.</span></li></ul><div class='it'><span class='bh'>Prevention</span>Maintain good water quality (DO &gt;5 mg/L, pH 7–8.5). Avoid overcrowding. Handle fish gently during netting to minimise injuries. Check for predatory catfish — bite wounds mimic fin rot.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> ফ্ল্যাভোব্যাকটেরিয়াম কলামনারে, অ্যারোমোনাস। খারাপ জলমান, ঘন মজুদ বা আঘাতে হয়। বর্ষা ও শীতে সবচেয়ে বেশি।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>লেজ ও পাখনার প্রান্ত ছিঁড়ে যায় ও ক্ষয় হয়। পাখনার প্রান্তে সাদা/হলুদ তুলার মতো বৃদ্ধি। পাখনা ছেঁড়া ও ছোট দেখায়। গুরুতর হলে পাখনার গোড়া লাল ও ক্ষতযুক্ত হয়। চিকিৎসা না করলে শরীরে ছড়ায়।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>স্টেরিডল ২০% — সকালে</span><span class='dlq'>৫০০ মিলি / একর</span></li><li><span class='dlc'>বিকেসি ৮০% — সন্ধ্যায় (স্টেরিডলের সাথে পর্যায়ক্রমে)</span><span class='dlq'>৫০০ মিলি / একর</span><span class='dln'>ফ্ল্যাভোব্যাকটেরিয়াম কলামনারের বিরুদ্ধে প্রধান জীবাণুনাশক — KMnO₄-এর চেয়ে কলামনারিসে বেশি কার্যকর।</span></li><li><span class='dlc'>অ্যাক্রিফ্লেভিন</span><span class='dlq'>২৫ গ্রাম / একর</span></li><li><span class='dlc'>KMnO₄ স্নান — জাল টানার পর ছাড়ার আগে</span><span class='dlq'>১ পিপিএম · ১ মিনিট</span><span class='dln'>কেবল দ্বিতীয় অ্যারোমোনাস ক্ষতের জন্য — কলামনারিসের জন্য পুকুরে দেবেন না।</span></li><li><span class='dlc'>ফসফরাস পরীক্ষা করুন</span><span class='dlq'>লক্ষ্যমাত্রা &lt;০.৫ মি.গ্রা/লি</span><span class='dln'>অতিরিক্ত ফসফরাস ব্যাকটেরিয়া বাড়ায়। সার ও গোবর কমান।</span></li></ul><div class='it'><span class='bh'>প্রতিরোধ</span>ভালো জলমান বজায় রাখুন (DO &gt;৫ মি.গ্রা/লি, pH ৭–৮.৫)। ঘন মজুদ এড়ান। শিকারি মাছ (ক্লারিয়াস, মাগুর) খুঁজুন — কামড়ের ক্ষতকে পাখনা পচা ভাবা হয়।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> ఫ్లేవోబాక్టీరియమ్ కలమ్నారే, అరోమోనాస్ జాతి. నీరు పాడైనప్పుడు, చేపలు ఎక్కువైనప్పుడు, లేదా గాయమైనప్పుడు వస్తుంది. వర్షాకాలంలో మరియు శీతాకాలంలో ఎక్కువ.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>తోక మరియు రెక్కల అంచులు అరిగిపోవడం. రెక్కల అంచులలో తెల్లటి/పసుపు రంగు పత్తి లాంటి పదార్థం. రెక్కలు చిరిగినట్టు, చిన్నగా కనిపిస్తాయి. తీవ్రంగా ఉంటే రెక్కల మూల ఎర్రగా, పుళ్ళతో ఉంటుంది.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>Steridol 20% — ఉదయం</span><span class='dlq'>500 ml / ఎకరా</span></li><li><span class='dlc'>BKC 80% — సాయంత్రం (Steridol తో వారుసగా)</span><span class='dlq'>500 ml / ఎకరా</span><span class='dln'>Flavobacterium columnare కు ప్రధాన పుకురు మందు — Columnaris కు KMnO₄ కంటే బాగా పని చేస్తుంది.</span></li><li><span class='dlc'>అక్రిఫ్లేవిన్</span><span class='dlq'>25 గ్రా / ఎకరా</span></li><li><span class='dlc'>KMnO₄ — వల వేసిన తర్వాత చేపను ముంచండి</span><span class='dlq'>1 ppm · 1 నిమిషం</span><span class='dln'>కేవలం Aeromonas గాయానికి మాత్రమే — Columnaris కు పుకురులో వేయకండి.</span></li><li><span class='dlc'>ఫాస్ఫరస్ తనిఖీ చేయండి</span><span class='dlq'>0.5 mg/L కంటే తక్కువ</span><span class='dln'>ఎక్కువ ఫాస్ఫరస్ బాక్టీరియా పెంచుతుంది. ఎరువులు తగ్గించండి.</span></li></ul><div class='it'><span class='bh'>నివారణ</span>మంచి నీటి నాణ్యత (DO &gt;5 mg/L, pH 7–8.5) నిర్వహించండి. మాగురు, జేలేడు వంటి వేట చేపలను తనిఖీ చేయండి — వాటి కాటు తోక పచ్చడిలా కనిపిస్తుంది.</div>`
},
{
  id:'red_dropsy', icon:'💧', ac:'ac-red',
  tags:[{c:'tb2',t:{en:'BACTERIAL · SYSTEMIC',bn:'ব্যাকটেরিয়া · সিস্টেমিক',te:'బాక్టీరియా · వ్యవస్థగత'}}],
  title:{en:'Red Disease & Dropsy (Ascites)',bn:'লাল রোগ ও জলোদর (ড্রপসি)',te:'ఎరుపు రోగం & చేప ఉబ్బే రోగం (డ్రాప్సీ)'},
  sub:{en:'Aeromonas hydrophila systemic · Abdominal swelling',bn:'অ্যারোমোনাস সিস্টেমিক সেপ্টিসেমিয়া · পেট ফোলা',te:'బాక్టీరియా రక్తంలోకి చేరి మొత్తం శరీరాన్ని పాడు చేస్తుంది'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Aeromonas hydrophila systemic septicaemia. Red disease = haemorrhages on fins and body surface. Dropsy (Ascites) = fluid accumulation in body cavity — a late-stage systemic infection. Rohu, Catla, Mrigal all affected.</div><div class='symp'><span class='symp-head'>Symptoms</span>Red disease: reddish patches on skin, base of fins and near vent. Dropsy: markedly swollen abdomen with raised scales (pinecone appearance). Pop-eye (exophthalmia). Very lethargic swimming. High mortality once dropsy stage reached.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>KMnO₄ pond treatment</span><span class='dlq'>2–4 mg/L</span></li><li><span class='dlc'>Agricultural lime</span><span class='dlq'>15–20 kg / bigha</span></li><li><span class='dlc'>Salt bath (NaCl)</span><span class='dlq'>10–15 g/L · 10–15 min</span></li><li><span class='dlc'>Oxytetracycline or Amoxicillin</span><span class='dlq'>50–75 mg/kg fish/day · 7–10 days</span><span class='dln'>Only under veterinary prescription. Dropsy stage has very poor prognosis — euthanise severe cases and remove from pond immediately.</span></li></ul><div class='iw'><span class='bh'>⚠ Note</span>Once ascites (dropsy) stage is reached, prognosis is very poor. Separate and remove affected fish immediately to prevent spread. Focus on prevention in remaining stock.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> অ্যারোমোনাস হাইড্রোফিলা (সিস্টেমিক সেপ্টিসেমিয়া)। লাল রোগ = পাখনায় ও ত্বকে রক্তক্ষরণ। ড্রপসি = শরীরের গহ্বরে তরল জমা — দেরিতে পাওয়া সিস্টেমিক সংক্রমণ। রুই, কাতলা, মৃগেল সব আক্রান্ত।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>লাল রোগ: ত্বকে, পাখনার গোড়ায় ও পায়ুর কাছে লাল দাগ। ড্রপসি: পেট ফুলে ওঠে, আঁশ উঠে যায় (পাইনকোন দেখতে)। চোখ বেরিয়ে আসা। খুব ধীরে সাঁতার। ড্রপসি পর্যায়ে মৃত্যুহার বেশি।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>KMnO₄ পুকুরে প্রয়োগ</span><span class='dlq'>২–৪ মি.গ্রা/লি</span></li><li><span class='dlc'>কৃষি চুন</span><span class='dlq'>১৫–২০ কেজি / বিঘা</span></li><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>১০–১৫ গ্রা/লি · ১০–১৫ মিনিট</span></li><li><span class='dlc'>অক্সিটেট্রাসাইক্লিন বা অ্যামোক্সিসিলিন</span><span class='dlq'>৫০–৭৫ মি.গ্রা/কেজি মাছ/দিন · ৭–১০ দিন</span><span class='dln'>শুধু পশু চিকিৎসকের পরামর্শে। ড্রপসি পর্যায়ে পূর্বাভাস খুবই খারাপ।</span></li></ul><div class='iw'><span class='bh'>⚠ সতর্কতা</span>ড্রপসি পর্যায়ে পূর্বাভাস খুবই খারাপ। আক্রান্ত মাছ অবিলম্বে আলাদা করুন এবং সরিয়ে দিন যাতে রোগ না ছড়ায়।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> అరోమోనాస్ హైడ్రోఫిలా బాక్టీరియా రక్తంలోకి చేరి మొత్తం శరీరాన్ని పాడు చేస్తుంది. ఎరుపు రోగం = రెక్కలు మరియు చర్మంపై రక్తస్రావం. డ్రాప్సీ = శరీర గుహలో ద్రవం చేరడం. రోహు, కట్లా, మృగల్ అన్నీ ప్రభావితమవుతాయి.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>ఎరుపు రోగం: చర్మంపై, రెక్కల మూలలో, పాయువు దగ్గర ఎర్రని మచ్చలు. డ్రాప్సీ: పొట్ట విపరీతంగా ఉబ్బుతుంది, పొలుసులు పైకి లేస్తాయి (పైన్‌కోన్ లాగా కనిపిస్తాయి). కళ్ళు బయటకు వస్తాయి.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>KMnO₄ చెరువులో</span><span class='dlq'>2–4 mg/L</span></li><li><span class='dlc'>వ్యవసాయ సున్నం</span><span class='dlq'>15–20 కి.గ్రా / బిఘా</span></li><li><span class='dlc'>NaCl ఉప్పు స్నానం</span><span class='dlq'>10–15 g/L · 10–15 నిమిషాలు</span></li><li><span class='dlc'>ఆక్సీటెట్రాసైక్లిన్ లేదా అమోక్సిసిలిన్</span><span class='dlq'>50–75 mg/kg చేప/రోజు · 7–10 రోజులు</span><span class='dln'>పశువైద్యుని సూచన మేరకు మాత్రమే. డ్రాప్సీ దశలో ఫలితాలు చాలా తక్కువ.</span></li></ul><div class='iw'><span class='bh'>⚠ హెచ్చరిక</span>డ్రాప్సీ దశకు చేరిన తర్వాత చికిత్స ఫలించే అవకాశం చాలా తక్కువ. వెంటనే ప్రభావిత చేపలను వేరుచేయండి.</div>`
},
{
  id:'argulus', icon:'🦠', ac:'ac-orange',
  tags:[{c:'tp',t:{en:'ECTOPARASITE',bn:'বহিঃপরজীবী',te:'బయట పరాన్నజీవి'}}],
  title:{en:'Argulus — Fish Lice (Argulosis)',bn:'আরগুলাস — মাছের উকুন (আরগুলোসিস)',te:'చేపకు పేన్లు పట్టడం (అర్గులోసిస్)'},
  sub:{en:'Disc-shaped ectoparasite · Visible to naked eye · Monsoon peak',bn:'চাকতি আকারের বহিঃপরজীবী · খালি চোখে দেখা যায়',te:'వర్షాకాలంలో ఎక్కువ · నగ్నంగా కనిపించే పేను'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Argulus foliaceus, A. japonicus. Disc-shaped branchiuran crustacean ectoparasite — visible to the naked eye (5–8 mm). Attaches to skin with suckers. Feeds on blood, injects anticoagulant and toxic saliva. Peaks in June–September (monsoon).</div><div class='symp'><span class='symp-head'>Symptoms</span>Visible disc-shaped parasites on skin and fins. Intense irritation — fish flashing (rubbing against substrate), jumping. Haemorrhagic spots at attachment sites. Anaemia, lethargy. Entry wounds allow secondary bacterial/fungal infection.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>Dipterex (Trichlorfon / Dylox) pond treatment</span><span class='dlq'>0.25 mg/L (0.25 ppm) · whole pond</span><span class='dln'>Most effective. Repeat in 7–10 days. Withhold harvest for 21 days post-treatment.</span></li><li><span class='dlc'>Organophosphate: Ekalux (Quinalphos 25% EC)</span><span class='dlq'>0.5 ml/100L bath · 5–10 min</span></li><li><span class='dlc'>Nuvan (Dichlorvos 76 EC) bath</span><span class='dlq'>1 ml/100L · 5 min</span></li><li><span class='dlc'>Salt (NaCl) bath — mild alternative</span><span class='dlq'>10–15 g/L · 10 min</span></li></ul><div class='step'>Prevention</div><ul class='dl'><li><span class='dlc'>Drain &amp; dry pond between crops</span><span class='dlq'>Kills resting eggs and juveniles</span></li><li><span class='dlc'>Quicklime (CaO) on dry pond bottom</span><span class='dlq'>200 kg / bigha</span></li></ul><div class='ib'><span class='bh'>✖ Caution</span>Organophosphate treatments (Dipterex, Nuvan, Ekalux) require strict withholding periods. Do NOT treat fish destined for harvest within 21 days. Use only registered formulations under veterinary guidance.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> আরগুলাস ফোলিয়াসিয়াস, এ. জাপোনিকাস। চাকতি আকারের বহিঃপরজীবী — খালি চোখে দেখা যায় (৫–৮ মিমি)। চুষক দিয়ে ত্বকে লাগে। রক্ত চুষে নেয় ও বিষাক্ত লালা ঢুকিয়ে দেয়। জুন–সেপ্টেম্বরে সবচেয়ে বেশি।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ত্বকে ও পাখনায় দৃশ্যমান চাকতি আকৃতির পরজীবী। তীব্র বিরক্তি — মাছ ঘষে বেড়ায়, লাফ দেয়। সংযুক্তির জায়গায় রক্তের দাগ। রক্তশূন্যতা, ঝিমুনি। ক্ষতস্থানে ব্যাকটেরিয়া ও ছত্রাক ঢোকে।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>ডিপটেরেক্স (ট্রাইক্লোরফন/ডাইলক্স) পুকুরে</span><span class='dlq'>০.২৫ মি.গ্রা/লি · পুরো পুকুর</span><span class='dln'>সবচেয়ে কার্যকর। ৭–১০ দিন পর আবার দিন। চিকিৎসার ২১ দিন পর মাছ ধরুন।</span></li><li><span class='dlc'>একালাক্স (কুইনালফস ২৫% ইসি) স্নান</span><span class='dlq'>০.৫ মিলি/১০০লি · ৫–১০ মিনিট</span></li><li><span class='dlc'>নুভান (ডিক্লোরভস ৭৬ ইসি) স্নান</span><span class='dlq'>১ মিলি/১০০লি · ৫ মিনিট</span></li><li><span class='dlc'>NaCl লবণ স্নান — হালকা বিকল্প</span><span class='dlq'>১০–১৫ গ্রা/লি · ১০ মিনিট</span></li></ul><div class='step'>প্রতিরোধ</div><ul class='dl'><li><span class='dlc'>ফসলের মাঝে পুকুর শুকিয়ে নিন</span><span class='dlq'>ডিম ও বাচ্চা মরে যায়</span></li><li><span class='dlc'>শুকনো পুকুরে চুন (CaO)</span><span class='dlq'>২০০ কেজি / বিঘা</span></li></ul><div class='ib'><span class='bh'>✖ সাবধান</span>অর্গানোফসফেট চিকিৎসায় কঠোর নিষেধাজ্ঞা পালন করুন। চিকিৎসার ২১ দিনের মধ্যে মাছ ধরবেন না।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> అర్గులస్ ఫోలియాసియస్, ఎ. జపోనికస్. చాపట్టు ఆకారపు బయట పరాన్నజీవి — నగ్నంగా కనిపిస్తుంది (5–8 mm). చేప చర్మంపై అంటుకొని రక్తం తాగుతుంది మరియు విష లాలాజలం చొప్పిస్తుంది. జూన్–సెప్టెంబర్‌లో ఎక్కువ.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>చర్మంపై మరియు రెక్కలపై కనిపించే చాపట్టు ఆకార పేలు. తీవ్రమైన చికాకు — చేపలు నేలకు రాసుకుంటాయి, గంతులు వేస్తాయి. అంటుకున్న చోట రక్తపు మచ్చలు. రక్తహీనత, మత్తుగా ఉండటం. గాయాల ద్వారా బాక్టీరియా చేరుతుంది.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>డిప్టెరెక్స్ (ట్రైక్లోర్ఫాన్) చెరువులో</span><span class='dlq'>0.25 mg/L · మొత్తం చెరువు</span><span class='dln'>అత్యంత ప్రభావవంతం. 7–10 రోజుల తర్వాత మళ్ళీ వేయండి. చికిత్స తర్వాత 21 రోజులు చేపలు పట్టుకోవద్దు.</span></li><li><span class='dlc'>ఎకలాక్స్ (క్వినల్‌ఫాస్ 25% EC) స్నానం</span><span class='dlq'>0.5 ml/100L · 5–10 నిమిషాలు</span></li><li><span class='dlc'>నువాన్ (డైక్లోర్‌వాస్ 76 EC) స్నానం</span><span class='dlq'>1 ml/100L · 5 నిమిషాలు</span></li><li><span class='dlc'>NaCl ఉప్పు స్నానం — తేలికైన ప్రత్యామ్నాయం</span><span class='dlq'>10–15 g/L · 10 నిమిషాలు</span></li></ul><div class='ib'><span class='bh'>✖ జాగ్రత్త</span>ఆర్గానోఫాస్ఫేట్ చికిత్సలకు కఠినమైన నిషేధ కాలాలు అవసరం. చికిత్స తర్వాత 21 రోజులు చేపలు పట్టుకోవద్దు.</div>`
},
{
  id:'myxozoan', icon:'🔬', ac:'ac-purple',
  tags:[{c:'tp',t:{en:'MYXOZOAN SPORE',bn:'মিক্সোজোয়ান',te:'లోపలి పరాన్నజీవి'}}],
  title:{en:'Myxobolus / Myxozoan Infections',bn:'মিক্সোবোলাস / মিক্সোজোয়ান স্পোর সংক্রমণ',te:'Myxobolus — చేపలో తెల్లటి గడ్డలు'},
  sub:{en:'Spore-forming endoparasite · White cysts in muscle/organs',bn:'স্পোর গঠনকারী অন্তঃপরজীবী · মাংসপেশিতে সাদা সিস্ট',te:'కండరాలలో తెల్లటి గడ్డలు — తినడానికి అనుకూలం కాదు'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Myxobolus spp., Myxobolus rohitae (in Rohu), M. catlaei (in Catla). Spore-forming endoparasites infecting muscle, gills, kidneys, and nervous system. Spores highly resistant — survive in pond mud for years.</div><div class='symp'><span class='symp-head'>Symptoms</span>White cysts (plasmodia) visible in muscle, gills, or organs on dissection. External deformities (bent spine, twisted body) in severe gill/brain infections. Reduced growth. Fish may appear normal externally — internal cysts discovered at processing.</div><div class='step'>Treatment (CIFRI / ICAR Validated)</div><ul class='dl'><li><span class='dlc'>Formalin 37% — pond treatment</span><span class='dlq'>1 L / ha</span><span class='dln'>ICAR field trials: reduces mortality from 5–13.5% to 1–4%. Apply morning with aerators ON. Do not repeat within 7 days.</span></li><li><span class='dlc'>NaCl salt dip</span><span class='dlq'>2–3% · 10 min · alternate days × 3 cycles</span></li><li><span class='dlc'>KMnO₄ — pond disinfection</span><span class='dlq'>1 ppm</span><span class='dln'>Alternate with formalin — do not use both on same day.</span></li><li><span class='dlc'>Yeast in feed (ICAR validated)</span><span class='dlq'>1 g/kg feed · 15 days</span><span class='dln'>Improves immunity; reduces myxosporidian burden in overstocked ponds.</span></li><li><span class='dlc'>Reduce stocking density</span><span class='dlq'>Target ≤ 3,500 fish/ha</span></li></ul><div class='step'>Prevention & Between-Crop</div><ul class='dl'><li><span class='dlc'>Pond dry + CaO (quicklime)</span><span class='dlq'>200–400 kg CaO / bigha · 2 weeks dry</span><span class='dln'>Only effective way to reduce spore load in pond soil. Skip inter-crop drying = guaranteed re-infection.</span></li><li><span class='dlc'>Avoid sourcing fingerlings from affected ponds</span><span class='dlq'>Inspect gills at purchase</span></li><li><span class='dlc'>Probiotic pond treatment</span><span class='dlq'>Weekly — reduces organic load that harbours spores</span></li></ul><div class='iw'><span class='bh'>⚠ Note</span>Spore cysts in advanced infections do not dissolve with treatment. Formalin + NaCl reduce new infections and mortality but cannot eliminate established cysts. Prevention through inter-crop drying remains the primary strategy.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> মিক্সোবোলাস রোহিতে (রুইয়ে), এম. ক্যাটলাই (কাতলায়)। স্পোর-গঠনকারী অন্তঃপরজীবী — মাংসপেশি, কানকো, কিডনি ও স্নায়ুতন্ত্রে সংক্রমণ করে। স্পোর অত্যন্ত প্রতিরোধী — পুকুরের কাদায় বছরের পর বছর বেঁচে থাকে।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ব্যবচ্ছেদ করলে মাংসপেশি, কানকো বা অঙ্গে সাদা সিস্ট দেখা যায়। গুরুতর কানকো/মস্তিষ্ক সংক্রমণে বাহ্যিক বিকৃতি। বৃদ্ধি কম। বাইরে থেকে স্বাভাবিক দেখাতে পারে।</div><div class='step'>চিকিৎসা (সিআইএফআরআই / আইসিএআর পরীক্ষিত)</div><ul class='dl'><li><span class='dlc'>ফর্মালিন ৩৭% — পুকুরে প্রয়োগ</span><span class='dlq'>১ লিটার / হেক্টর</span><span class='dln'>আইসিএআর মাঠ পরীক্ষায় মৃত্যু ৫–১৩.৫% থেকে ১–৪%-এ নামিয়ে আনে। সকালে বায়ু সরবরাহ চালু রেখে দিন। ৭ দিনের মধ্যে পুনরায় দেবেন না।</span></li><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>২–৩% · ১০ মিনিট · একদিন অন্তর × ৩ চক্র</span></li><li><span class='dlc'>KMnO₄ — পুকুর জীবাণুমুক্তকরণ</span><span class='dlq'>১ পিপিএম</span><span class='dln'>ফর্মালিনের সাথে পর্যায়ক্রমে — একই দিনে দুটো দেবেন না।</span></li><li><span class='dlc'>ইস্ট খাদ্যে (আইসিএআর পরীক্ষিত)</span><span class='dlq'>১ গ্রাম/কেজি খাবার · ১৫ দিন</span></li><li><span class='dlc'>মজুদ ঘনত্ব কমান</span><span class='dlq'>লক্ষ্যমাত্রা ≤ ৩,৫০০ মাছ/হেক্টর</span></li></ul><div class='step'>প্রতিরোধ ও ফসলের মাঝে</div><ul class='dl'><li><span class='dlc'>পুকুর শুকনো + CaO (চুন)</span><span class='dlq'>২০০–৪০০ কেজি CaO / বিঘা · ২ সপ্তাহ শুকনো</span><span class='dln'>পুকুরের মাটিতে স্পোর লোড কমানোর একমাত্র কার্যকর উপায়।</span></li><li><span class='dlc'>আক্রান্ত পুকুর থেকে পোনা আনবেন না</span><span class='dlq'>কেনার সময় কানকো পরীক্ষা করুন</span></li><li><span class='dlc'>প্রোবায়োটিক পুকুরে প্রয়োগ</span><span class='dlq'>সাপ্তাহিক — জৈব ভার কমায়</span></li></ul><div class='iw'><span class='bh'>⚠ সতর্কতা</span>উন্নত সংক্রমণে সিস্ট চিকিৎসায় দ্রবীভূত হয় না। ফর্মালিন + NaCl নতুন সংক্রমণ ও মৃত্যু কমায় কিন্তু প্রতিষ্ঠিত সিস্ট দূর করতে পারে না। শুকনো পুকুর-চুন পরিক্রমাই প্রধান কৌশল।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> మైక్సోబోలస్ రోహిటే (రోహులో), ఎం. కాట్లాయి (కట్లాలో). స్పోర్-ఉత్పత్తి చేసే లోపలి పరాన్నజీవులు — కండరాలు, చెవులు, మూత్రపిండాలు మరియు నాడీ వ్యవస్థను సంక్రమిస్తాయి. స్పోర్లు చాలా నిరోధకంగా ఉంటాయి.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>కోసి చూస్తే కండరాలు, చెవులు లేదా అవయవాలలో తెల్లని గడ్డలు కనిపిస్తాయి. తీవ్రమైన సంక్రమణలో శరీర వంపు, ఒత్తిగిలిన వెన్ను. పెరుగుదల తక్కువ. బయటికి సాధారణంగా కనిపించవచ్చు.</div><div class='step'>చికిత్స (CIFRI / ICAR నిరూపించింది)</div><ul class='dl'><li><span class='dlc'>Formalin 37% — పుకురులో వేయండి</span><span class='dlq'>1 లీ / హెక్టార్</span><span class='dln'>ICAR పరీక్షలో చనిపోవడం 5–13.5% నుండి 1–4% కి తగ్గింది. ఉదయం గాలి యంత్రాలు వేసి వేయండి. 7 రోజుల్లోపు మళ్ళీ వేయకండి.</span></li><li><span class='dlc'>ఉప్పు నీళ్ళలో ముంచండి</span><span class='dlq'>2–3% · 10 నిమిషాలు · ఒక రోజు వదిలి × 3 సార్లు</span></li><li><span class='dlc'>KMnO₄ — పుకురులో వేయండి</span><span class='dlq'>1 ppm</span><span class='dln'>Formalin తో వారుసగా వేయండి — ఒకే రోజు రెండూ వేయకండి.</span></li><li><span class='dlc'>ఈస్ట్ మేతలో కలపండి</span><span class='dlq'>1 గ్రా/కేజీ మేత · 15 రోజులు</span></li><li><span class='dlc'>పుకురులో చేపలు తగ్గించండి</span><span class='dlq'>హెక్టారుకు 3,500 కంటే తక్కువ</span></li></ul><div class='step'>నివారణ & పంటల మధ్య</div><ul class='dl'><li><span class='dlc'>చెరువు ఆరబెట్టడం + CaO (సున్నం)</span><span class='dlq'>200–400 కి.గ్రా CaO / బిఘా · 2 వారాలు</span><span class='dln'>చెరువు నేలలో స్పోర్ భారాన్ని తగ్గించడానికి ఏకైక ప్రభావవంతమైన మార్గం.</span></li><li><span class='dlc'>ప్రభావిత చెరువుల నుండి పిల్ల చేపలు తీసుకోవద్దు</span><span class='dlq'>కొనేటప్పుడు చెవులు పరీక్షించండి</span></li><li><span class='dlc'>ప్రొబయోటిక్ చెరువులో</span><span class='dlq'>వారంవారీ — సేంద్రియ భారం తగ్గిస్తుంది</span></li></ul><div class='iw'><span class='bh'>⚠ గమనిక</span>పాత గడ్డలు మందుతో కరగవు. Formalin + NaCl కొత్త సంక్రమణ మరియు మరణాలను తగ్గిస్తాయి కానీ పాత గడ్డలను తొలగించవు. ఆరబెట్టడం-సున్నం చక్రమే ప్రధాన వ్యూహం.</div>`
},

  id:'ich', icon:'⚪', ac:'ac-purple',
  tags:[{c:'tp',t:{en:'CILIATE PROTOZOAN',bn:'সিলিয়েট প্রোটোজোয়া',te:'సూక్ష్మ జీవి'}}],
  title:{en:'Ich — White Spot Disease',bn:'আইকে — সাদা দাগ রোগ (ইকথিওফথিরিয়াস)',te:'ICH — తెల్ల మచ్చల రోగం'},
  sub:{en:'Ichthyophthirius multifiliis · Salt + heat treatment',bn:'ইকথিওফথিরিয়াস মাল্টিফিলিস · লবণ + তাপ চিকিৎসা',te:'లవణం + వేడి చికిత్స · వేగంగా వ్యాప్తి చెందుతుంది'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Ichthyophthirius multifiliis (ciliate protozoan). One of the most common fish diseases worldwide. The free-swimming theront stage infects fish skin and gills. Highly contagious — spreads rapidly in crowded ponds. Peaks in cool water (&lt;22°C).</div><div class='symp'><span class='symp-head'>Symptoms</span>Small white salt-like spots (1 mm) on skin, fins and gills — these are the trophont stage under the fish's mucus. Fish rub against substrate (flashing). Gills may be affected causing respiratory distress. Severe infestations cause mucus overproduction and skin sloughing.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>Salt (NaCl) bath</span><span class='dlq'>10–15 g/L · 10–15 min</span></li><li><span class='dlc'>KMnO₄ pond treatment</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>Increase water temperature to &gt;28°C</span><span class='dlq'>Accelerates parasite lifecycle → theronts killed faster</span><span class='dln'>Heat treatment shortens the time theronts are vulnerable. At &lt;15°C the lifecycle slows dramatically — harder to treat.</span></li><li><span class='dlc'>Formalin bath</span><span class='dlq'>150–200 mg/L · 1 hour or 25 mg/L flow-through</span></li></ul><div class='it'><span class='bh'>Tip</span>Treat at least 3 times over 7–10 days to catch successive theront releases from cysts. Single treatment is never sufficient — the encysted tomont stage is insensitive to all treatments.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> ইকথিওফথিরিয়াস মাল্টিফিলিস (সিলিয়েট প্রোটোজোয়া)। বিশ্বের সবচেয়ে সাধারণ মাছের রোগগুলির মধ্যে একটি। মুক্ত সাঁতারকারী থেরন্ট পর্যায় ত্বক ও কানকোতে সংক্রমণ করে। অত্যন্ত সংক্রামক। ঠান্ডা জলে (&lt;২২°C) সবচেয়ে বেশি।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ত্বকে, পাখনায় ও কানকোতে ছোট সাদা লবণের দানার মতো দাগ (১ মিমি)। মাছ নিচের দিকে ঘষে। কানকো আক্রান্ত হলে শ্বাসকষ্ট। তীব্র সংক্রমণে অতিরিক্ত শ্লেষ্মা ও ত্বক উঠে যায়।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>১০–১৫ গ্রা/লি · ১০–১৫ মিনিট</span></li><li><span class='dlc'>KMnO₄ পুকুরে প্রয়োগ</span><span class='dlq'>২–৩ মি.গ্রা/লি</span></li><li><span class='dlc'>জলের তাপমাত্রা &gt;২৮°C বাড়ান</span><span class='dlq'>পরজীবীর জীবনচক্র ত্বরান্বিত করে → থেরন্ট দ্রুত মরে</span></li><li><span class='dlc'>ফর্মালিন স্নান</span><span class='dlq'>১৫০–২০০ মি.গ্রা/লি · ১ ঘণ্টা</span></li></ul><div class='it'><span class='bh'>টিপস</span>৭–১০ দিনে অন্তত ৩ বার চিকিৎসা দিন। একক চিকিৎসা কখনো যথেষ্ট নয় — সিস্টে থাকা টোমন্ট পর্যায় সব চিকিৎসায় অপ্রভাবিত।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> ఇచ్థియోఫ్థిరియస్ మల్టిఫిలిస్ (సిలియేట్ ప్రొటోజోవా). ప్రపంచంలో అత్యంత సాధారణ చేప వ్యాధులలో ఒకటి. స్వేచ్ఛగా ఈదే థెరాంట్ దశ చేప చర్మం మరియు చెవులను సంక్రమిస్తుంది. చల్లని నీటిలో (&lt;22°C) ఎక్కువ.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>చర్మం, రెక్కలు మరియు చెవులపై చిన్న తెల్లని ఉప్పు రేణువుల లాంటి మచ్చలు (1 mm). చేపలు నేలకు రాసుకుంటాయి. చెవులు ప్రభావితమైతే శ్వాస కష్టం. తీవ్రమైన సంక్రమణలో అధిక జిగురు మరియు చర్మం వలుస్తుంది.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>NaCl ఉప్పు స్నానం</span><span class='dlq'>10–15 g/L · 10–15 నిమిషాలు</span></li><li><span class='dlc'>KMnO₄ చెరువులో</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>నీటి ఉష్ణోగ్రత &gt;28°C కి పెంచండి</span><span class='dlq'>పరాన్నజీవి జీవిత చక్రాన్ని వేగవంతం చేస్తుంది</span></li><li><span class='dlc'>ఫార్మాలిన్ స్నానం</span><span class='dlq'>150–200 mg/L · 1 గంట</span></li></ul><div class='it'><span class='bh'>చిట్కా</span>7–10 రోజులలో కనీసం 3 సార్లు చికిత్స చేయండి. ఒకే చికిత్స ఎప్పుడూ సరిపోదు — సిస్ట్ దశలో ఉన్న టోమాంట్ అన్ని చికిత్సలకు అందవు.</div>`
},
{
  id:'gill_rot', icon:'🫁', ac:'ac-purple',
  tags:[{c:'tf',t:{en:'FUNGAL',bn:'ছত্রাক',te:'శిలీంధ్ర రోగం'}}],
  title:{en:'Gill Rot — Branchiomycosis',bn:'কানকোর পচন — ব্রাংকিওমাইকোসিস',te:'చేప చెవులు కుళ్ళే రోగం'},
  sub:{en:'Branchiomyces sanguinis/demigrans · Summer monsoon fungal',bn:'ব্রাংকিওমাইসেস · গ্রীষ্ম-বর্ষার ছত্রাক রোগ',te:'వేసవి-వర్షాకాలపు శిలీంధ్ర రోగం'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Branchiomyces sanguinis, B. demigrans (aquatic fungi). Infects gill blood vessels causing necrosis — gills turn grey, brown, or black with characteristic mottled pattern. Peak: May–August (high temperature + organic load). Rohu most susceptible.</div><div class='symp'><span class='symp-head'>Symptoms</span>Gills appear mottled grey-brown-white. Dark patches of necrotic tissue alternating with pale areas. Fish surface-gasp (respiratory distress). Gills may crumble easily on touch. Severe mortality possible within days in acute outbreaks.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>KMnO₄ pond treatment</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>Agricultural lime</span><span class='dlq'>15–25 kg / bigha · raise pH to 8+</span></li><li><span class='dlc'>Formalin bath</span><span class='dlq'>100–150 mg/L · 30–60 min</span></li><li><span class='dlc'>Water exchange — reduce organic load</span><span class='dlq'>25–30% immediately</span></li></ul><div class='step'>Prevention</div><ul class='dl'><li><span class='dlc'>Maintain good water quality — DO &gt;5 mg/L</span><span class='dlq'>Branchiomyces thrives in low DO + high organic</span></li><li><span class='dlc'>Fortnightly lime application May–August</span><span class='dlq'>10–15 kg / bigha</span></li><li><span class='dlc'>Reduce stocking density in summer</span><span class='dlq'>Prevents hypoxia which triggers outbreak</span></li></ul>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> ব্রাংকিওমাইসেস সাংগুইনিস, বি. ডেমিগ্রান্স (জলজ ছত্রাক)। কানকোর রক্তনালীতে সংক্রমণ করে পচন তৈরি করে। মে–আগস্টে সবচেয়ে বেশি। রুই সবচেয়ে সংবেদনশীল।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>কানকো ছাই-বাদামী-সাদা দেখায়। মৃত ও স্বাভাবিক টিস্যুর পর্যায়ক্রমিক প্যাটার্ন। মাছ উপরে এসে শ্বাস নেয়। গুরুতর প্রাদুর্ভাবে দিনের মধ্যে মৃত্যু।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>KMnO₄ পুকুরে প্রয়োগ</span><span class='dlq'>২–৩ মি.গ্রা/লি</span></li><li><span class='dlc'>কৃষি চুন</span><span class='dlq'>১৫–২৫ কেজি / বিঘা · pH ৮+ করুন</span></li><li><span class='dlc'>ফর্মালিন স্নান</span><span class='dlq'>১০০–১৫০ মি.গ্রা/লি · ৩০–৬০ মিনিট</span></li><li><span class='dlc'>পানি বদল — জৈব ভার কমান</span><span class='dlq'>তক্ষুনি ২৫–৩০%</span></li></ul><div class='step'>প্রতিরোধ</div><ul class='dl'><li><span class='dlc'>DO &gt;৫ মি.গ্রা/লি বজায় রাখুন</span><span class='dlq'>ব্রাংকিওমাইসেস কম DO + বেশি জৈব ভারে বাড়ে</span></li><li><span class='dlc'>মে–আগস্ট পক্ষকালে চুন</span><span class='dlq'>১০–১৫ কেজি / বিঘা</span></li></ul>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> బ్రాంకియోమైసెస్ సాంగ్వినిస్, బి. డెమిగ్రాన్స్ (జలచర శిలీంధ్రాలు). చేప చెవుల రక్తనాళాలను సంక్రమించి కుళ్ళిపోవడానికి కారణమవుతుంది. మే–ఆగస్ట్‌లో ఎక్కువ. రోహు చేప అత్యంత సున్నితంగా ఉంటుంది.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>చెవులు బూడిద-గోధుమ-తెలుపు మొత్తిక మచ్చలు కలిగి కనిపిస్తాయి. చేపలు పైకి వచ్చి శ్వాస తీసుకుంటాయి. తీవ్రమైన వ్యాప్తిలో రోజుల్లోనే మరణాలు.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>KMnO₄ చెరువులో</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>వ్యవసాయ సున్నం</span><span class='dlq'>15–25 కి.గ్రా / బిఘా · pH 8+ కి పెంచండి</span></li><li><span class='dlc'>ఫార్మాలిన్ స్నానం</span><span class='dlq'>100–150 mg/L · 30–60 నిమిషాలు</span></li><li><span class='dlc'>నీటి మార్పు — సేంద్రియ భారం తగ్గించండి</span><span class='dlq'>వెంటనే 25–30%</span></li></ul><div class='step'>నివారణ</div><ul class='dl'><li><span class='dlc'>DO &gt;5 mg/L నిర్వహించండి</span><span class='dlq'>బ్రాంకియోమైసెస్ తక్కువ DO + అధిక సేంద్రియంలో పెరుగుతుంది</span></li><li><span class='dlc'>మే–ఆగస్ట్ పక్షానికోసారి సున్నం</span><span class='dlq'>10–15 కి.గ్రా / బిఘా</span></li></ul>`
},

  id:'bga', icon:'🟢', ac:'ac-teal',
  tags:[{c:'tw',t:{en:'WATER QUALITY',bn:'জলমান',te:'నీటి నాణ్యత'}}],
  title:{en:'Blue-Green Algae (BGA / Cyanobacteria)',bn:'নীলাভ-সবুজ শেওলা (সায়ানোব্যাকটেরিয়া)',te:'నీలం-ఆకుపచ్చ పాచి (హానికరమైన శేవాలు)'},
  sub:{en:'Microcystis · Musty odour · Liver damage in fish',bn:'মাইক্রোসিস্টিস · মাটির গন্ধ · মাছের যকৃতের ক্ষতি',te:'మట్టి వాసన · చేపలలో కాలేయ నష్టం'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Microcystis aeruginosa, Anabaena spp., Oscillatoria spp. Toxic cyanobacteria bloom when nitrogen:phosphorus ratio is high and water stagnates. Produces microcystin hepatotoxins — damages fish liver and kidneys. Dense surface scum, blue-green/olive colour, musty/earthy odour. Summer peak.</div><div class='symp'><span class='symp-head'>Symptoms</span>Dense blue-green surface scum (windward accumulation). Musty/earthy odour. Fish mortality (liver damage from microcystins). DO crashes at night (bloom respiration). Off-flavour in fish flesh (consumer complaint). Turbid green/brown water after bloom crash.</div><div class='step'>Management</div><ul class='dl'><li><span class='dlc'>Agricultural lime — raise pH</span><span class='dlq'>15–20 kg / bigha · suppresses BGA</span></li><li><span class='dlc'>Reduce fertiliser input — especially phosphorus</span><span class='dlq'>Stop urea + superphosphate during bloom</span></li><li><span class='dlc'>Water exchange</span><span class='dlq'>20–30% · dilute bloom density</span></li><li><span class='dlc'>Copper sulphate (CuSO₄)</span><span class='dlq'>0.5–1 mg/L · ONLY after lab species confirmation</span><span class='dln'>Warning: killing bloom in situ releases all toxins simultaneously — can cause mass fish mortality. Use only in targeted corner treatment, not whole pond.</span></li></ul><div class='iw'><span class='bh'>⚠ Do NOT kill entire bloom with CuSO₄</span>Sudden bloom kill releases all accumulated microcystins at once — can kill more fish than the bloom itself. Gradual water exchange + lime is safer.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> মাইক্রোসিস্টিস অ্যারুগিনোসা, অ্যানাবেনা, অসিলেটোরিয়া। নাইট্রোজেন:ফসফরাস অনুপাত বেশি হলে এবং জল স্থির থাকলে বিষাক্ত সায়ানোব্যাকটেরিয়া ব্লুম হয়। মাইক্রোসিস্টিন হেপাটোটক্সিন উৎপন্ন করে — মাছের যকৃত ও কিডনির ক্ষতি। গ্রীষ্মে সবচেয়ে বেশি।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ঘন নীলাভ-সবুজ উপরিভাগের ভাসমান স্তর। মাটির গন্ধ। মাছের মৃত্যু (মাইক্রোসিস্টিন থেকে যকৃতের ক্ষতি)। রাতে DO পড়ে যায়। মাছের মাংসে দুর্গন্ধ।</div><div class='step'>ব্যবস্থাপনা</div><ul class='dl'><li><span class='dlc'>কৃষি চুন — pH বাড়ান</span><span class='dlq'>১৫–২০ কেজি / বিঘা · BGA দমন করে</span></li><li><span class='dlc'>সার প্রয়োগ কমান — বিশেষত ফসফরাস</span><span class='dlq'>ব্লুমের সময় ইউরিয়া + সুপারফসফেট বন্ধ</span></li><li><span class='dlc'>পানি বদল</span><span class='dlq'>২০–৩০% · ব্লুম ঘনত্ব কমান</span></li><li><span class='dlc'>কপার সালফেট (CuSO₄)</span><span class='dlq'>০.৫–১ মি.গ্রা/লি · প্রজাতি নিশ্চিত হওয়ার পরেই</span><span class='dln'>সাবধান: পুরো ব্লুম মেরে ফেললে একসাথে সব টক্সিন নির্গত হয় — গণমৃত্যু।</span></li></ul><div class='iw'><span class='bh'>⚠ CuSO₄ দিয়ে পুরো ব্লুম মারবেন না</span>হঠাৎ ব্লুম ধ্বংসে একসাথে সব মাইক্রোসিস্টিন নির্গত হয় — মাছ বেশি মরতে পারে। ধীরে পানি বদল + চুন নিরাপদ।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> మైక్రోసిస్టిస్ ఏరుగినోసా, అనాబేనా, ఆసిలటోరియా. నత్రజని:ఫాస్ఫరస్ నిష్పత్తి అధికంగా ఉండి నీరు నిలిచిపోయినప్పుడు విష సైనోబాక్టీరియా బ్లూమ్ వస్తుంది. మైక్రోసిస్టిన్ హెపటోటాక్సిన్లను ఉత్పత్తి చేస్తుంది. వేసవిలో ఎక్కువ.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>దట్టమైన నీలం-ఆకుపచ్చ ఉపరితల పొర. మట్టి వాసన. మైక్రోసిస్టిన్ నుండి కాలేయ నష్టం వల్ల చేపల మరణాలు. రాత్రి DO పడిపోతుంది. చేప మాంసంలో చెడు వాసన.</div><div class='step'>నిర్వహణ</div><ul class='dl'><li><span class='dlc'>వ్యవసాయ సున్నం — pH పెంచండి</span><span class='dlq'>15–20 కి.గ్రా / బిఘా · BGA నిరోధిస్తుంది</span></li><li><span class='dlc'>ఎరువు తగ్గించండి — ముఖ్యంగా ఫాస్ఫరస్</span><span class='dlq'>బ్లూమ్ సమయంలో యూరియా + సూపర్‌ఫాస్ఫేట్ ఆపండి</span></li><li><span class='dlc'>నీటి మార్పు</span><span class='dlq'>20–30% · బ్లూమ్ సాంద్రత తగ్గించండి</span></li><li><span class='dlc'>కాపర్ సల్ఫేట్ (CuSO₄)</span><span class='dlq'>0.5–1 mg/L · జాతి నిర్ధారణ తర్వాత మాత్రమే</span><span class='dln'>హెచ్చరిక: మొత్తం బ్లూమ్ ఒకేసారి చంపితే అన్ని టాక్సిన్లు ఒకేసారి విడుదలవుతాయి.</span></li></ul><div class='iw'><span class='bh'>⚠ CuSO₄ తో మొత్తం బ్లూమ్ చంపవద్దు</span>హఠాత్తు బ్లూమ్ నాశనం మైక్రోసిస్టిన్‌లను ఒకేసారి విడుదల చేస్తుంది — మరింత ఎక్కువ చేపలు చనిపోవచ్చు. క్రమంగా నీటి మార్పు + సున్నం సురక్షితం.</div>`
},
{
  id:'turbid_water', icon:'💧', ac:'ac-sky',
  tags:[{c:'tw',t:{en:'WATER QUALITY',bn:'জলমান',te:'నీటి నాణ్యత'}}],
  title:{en:'Turbid, Black & Red-Brown Water',bn:'ঘোলা, কালো ও লাল-বাদামী জল',te:'పుకురు నీరు మారినప్పుడు — సమస్య & చికిత్స'},
  sub:{en:'Suspended solids · Algae crashes · Plankton management',bn:'ভাসমান কণা · শেওলার ক্র্যাশ · প্ল্যাংকটন ব্যবস্থাপনা',te:'ప్లాంక్టన్ నిర్వహణ · నీటి రంగు మార్పులు'},
  en:`<div class='cause'><strong>Turbid Brown (Clay/Silt):</strong> Heavy rainfall runoff carrying clay particles. Blocks sunlight → stops photosynthesis → kills phytoplankton → DO crash. Common in monsoon. Treatment: Agricultural gypsum CaSO₄ (5–10 kg/bigha) flocculates suspended clay particles.<br><strong>Black Water:</strong> Decomposing organic matter + H₂S from anaerobic bottom. Sign of severe organic overload. DO crash imminent. Treatment: Lime + aeration immediately.<br><strong>Red-Brown / Red Algae:</strong> Euglena, Dinoflagellate, or Diatom bloom — often preceded by heavy fertilisation.</div><div class='step'>Turbid Brown Treatment</div><ul class='dl'><li><span class='dlc'>Agricultural gypsum (CaSO₄)</span><span class='dlq'>5–10 kg / bigha · flocculates clay</span></li><li><span class='dlc'>Alum Al₂(SO₄)₃</span><span class='dlq'>2–5 kg / bigha · stronger flocculant</span></li><li><span class='dlc'>Lime Ca(OH)₂</span><span class='dlq'>10–15 kg / bigha</span></li></ul><div class='step'>Black Water Treatment</div><ul class='dl'><li><span class='dlc'>Lime (Ca(OH)₂) — emergency</span><span class='dlq'>20–25 kg / bigha · immediately</span></li><li><span class='dlc'>Run all aerators</span><span class='dlq'>24/7 until DO stabilises &gt;5 mg/L</span></li><li><span class='dlc'>Water exchange</span><span class='dlq'>20–30%</span></li></ul><div class='step'>Dense Green/Brown Phytoplankton Bloom</div><ul class='dl'><li><span class='dlc'>Stop all fertiliser input immediately</span><span class='dlq'>Cut nitrogen + phosphorus</span></li><li><span class='dlc'>Partial water exchange</span><span class='dlq'>15–20% · dilute nutrient load</span></li><li><span class='dlc'>Probiotic pond treatment</span><span class='dlq'>Weekly — competes with algae for nutrients</span></li></ul>`,
  bn:`<div class='cause'><strong>ঘোলা বাদামী (মাটি/পলি):</strong> বর্ষার জলে মাটির কণা আসে। সূর্যালোক আটকায় → ফাইটোপ্ল্যাংকটন মরে → DO পড়ে যায়। চিকিৎসা: জিপসাম CaSO₄ (৫–১০ কেজি/বিঘা) মাটির কণা জমাট করে।<br><strong>কালো জল:</strong> অ্যানারোবিক তলে জৈব পদার্থ পচন + H₂S। জৈব ভারের গুরুতর চিহ্ন। চিকিৎসা: অবিলম্বে চুন + বায়ু সঞ্চালন।<br><strong>লাল-বাদামী / লাল শেওলা:</strong> ইউগ্লেনা, ডাইনোফ্ল্যাজেলেট বা ডায়াটম ব্লুম।</div><div class='step'>ঘোলা বাদামী জল চিকিৎসা</div><ul class='dl'><li><span class='dlc'>জিপসাম (CaSO₄)</span><span class='dlq'>৫–১০ কেজি / বিঘা · মাটি জমাট করে</span></li><li><span class='dlc'>ফিটকিরি Al₂(SO₄)₃</span><span class='dlq'>২–৫ কেজি / বিঘা · শক্তিশালী ফ্লকুল্যান্ট</span></li><li><span class='dlc'>চুন Ca(OH)₂</span><span class='dlq'>১০–১৫ কেজি / বিঘা</span></li></ul><div class='step'>কালো জল চিকিৎসা</div><ul class='dl'><li><span class='dlc'>চুন (Ca(OH)₂) — জরুরি</span><span class='dlq'>২০–২৫ কেজি / বিঘা · অবিলম্বে</span></li><li><span class='dlc'>সব এয়ারেটর চালু</span><span class='dlq'>DO &gt;৫ মি.গ্রা/লি হওয়া পর্যন্ত</span></li><li><span class='dlc'>পানি বদল</span><span class='dlq'>২০–৩০%</span></li></ul>`,
  te:`<div class='cause'><strong>ఘోళా గోధుమ రంగు (మట్టి/పూడిక):</strong> వర్షాకాల ప్రవాహంలో మట్టి కణాలు వస్తాయి. సూర్యకాంతి అడ్డుకోబడుతుంది → ఫైటోప్లాంక్టన్ చనిపోతుంది → DO పడిపోతుంది. చికిత్స: జిప్సం CaSO₄ (5–10 కి.గ్రా/బిఘా) మట్టి కణాలను అవక్షేపిస్తుంది.<br><strong>నల్లని నీరు:</strong> అవాయు నేలలో సేంద్రియ పదార్థం కుళ్ళటం + H₂S. తీవ్రమైన సేంద్రియ అధిక భారం. చికిత్స: వెంటనే సున్నం + గాలి సంచలనం.<br><strong>ఎర్రని-గోధుమ / ఎర్రని పాచి:</strong> యూగ్లినా, డయాటమ్ బ్లూమ్.</div><div class='step'>ఘోళా గోధుమ నీరు చికిత్స</div><ul class='dl'><li><span class='dlc'>జిప్సం (CaSO₄)</span><span class='dlq'>5–10 కి.గ్రా / బిఘా · మట్టి అవక్షేపిస్తుంది</span></li><li><span class='dlc'>అలం Al₂(SO₄)₃</span><span class='dlq'>2–5 కి.గ్రా / బిఘా · శక్తివంతమైన అవక్షేపకం</span></li><li><span class='dlc'>సున్నం Ca(OH)₂</span><span class='dlq'>10–15 కి.గ్రా / బిఘా</span></li></ul><div class='step'>నల్లని నీరు చికిత్స</div><ul class='dl'><li><span class='dlc'>సున్నం (Ca(OH)₂) — అత్యవసరం</span><span class='dlq'>20–25 కి.గ్రా / బిఘా · వెంటనే</span></li><li><span class='dlc'>అన్ని ఏరేటర్లు ఆన్</span><span class='dlq'>DO &gt;5 mg/L స్థిరమయ్యేంత వరకు</span></li><li><span class='dlc'>నీటి మార్పు</span><span class='dlq'>20–30%</span></li></ul>`
},
{
  id:'mucus', icon:'🫧', ac:'ac-teal',
  tags:[{c:'tg2',t:{en:'HEALTH INDICATOR',bn:'স্বাস্থ্য সূচক',te:'ఆరోగ్య సూచన'}}],
  title:{en:'Fish Gill & Body Mucus (Gel) Management',bn:'মাছের কানকো ও শরীরের শ্লেষ্মা ব্যবস্থাপনা',te:'చేప శరీరంపై జిగురు (Mucus) — నిర్వహణ'},
  sub:{en:'Excess mucus = stress indicator · Gill health = fish health',bn:'অতিরিক্ত শ্লেষ্মা = চাপের সংকেত · কানকো = মাছের স্বাস্থ্য',te:'అధిక జిగురు = ఒత్తిడి సంకేతం'},
  en:`<div class='cause'><strong>What is Mucus:</strong> Fish produce a protective mucus (gel) coat over skin and gills. Healthy mucus = thin, clear, slightly slippery. Excess/abnormal mucus = stress response to irritants (poor water quality, parasites, toxins, handling stress). Gill mucus overproduction is a critical early warning sign.</div><div class='symp'><span class='symp-head'>Signs of Abnormal Mucus</span>Thick, cloudy or brownish mucus on gills. Excess mucus sloughing off body during handling. Gills appear "coated" or clogged with mucus. Fish gasping at surface (gill function impaired). Foul-smelling mucus may indicate secondary infection.</div><div class='step'>Investigation Protocol</div><ul class='dl'><li><span class='dlc'>Test water quality first</span><span class='dlq'>DO, NH₃, pH, turbidity</span></li><li><span class='dlc'>Check for external parasites (Ich, Argulus, Trichodina)</span><span class='dlq'>Microscopic gill scraping examination</span></li><li><span class='dlc'>Assess stocking density and aeration</span><span class='dlq'>Crowding stress triggers mucus overproduction</span></li></ul><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>Salt (NaCl) bath — soothing + osmotic regulation</span><span class='dlq'>5–10 g/L · 15–20 min</span></li><li><span class='dlc'>KMnO₄ bath — remove parasites + debris from gills</span><span class='dlq'>5–10 mg/L · 30 min</span></li><li><span class='dlc'>Lime — improve water quality</span><span class='dlq'>10–15 kg / bigha</span></li><li><span class='dlc'>Increase aeration — reduce crowding stress</span><span class='dlq'>Target DO &gt;5 mg/L</span></li></ul>`,
  bn:`<div class='cause'><strong>শ্লেষ্মা কী:</strong> মাছ ত্বক ও কানকোতে প্রতিরক্ষামূলক শ্লেষ্মার আবরণ তৈরি করে। স্বাস্থ্যকর শ্লেষ্মা = পাতলা, স্বচ্ছ। অতিরিক্ত/অস্বাভাবিক শ্লেষ্মা = জলমান সমস্যা, পরজীবী বা পরিচালনার চাপের সংকেত। কানকোতে অতিরিক্ত শ্লেষ্মা একটি গুরুত্বপূর্ণ প্রাথমিক সতর্কতা চিহ্ন।</div><div class='symp'><span class='symp-head'>অস্বাভাবিক শ্লেষ্মার লক্ষণ</span>কানকোতে পুরু, মেঘলা বা বাদামী শ্লেষ্মা। সরানোর সময় শরীর থেকে অতিরিক্ত শ্লেষ্মা খুলে পড়া। কানকো "আবৃত" বা শ্লেষ্মায় আটকানো দেখায়। মাছ উপরে এসে শ্বাস নেয়। দুর্গন্ধযুক্ত শ্লেষ্মায় সেকেন্ডারি সংক্রমণ।</div><div class='step'>তদন্ত প্রণালী</div><ul class='dl'><li><span class='dlc'>প্রথমে জলমান পরীক্ষা</span><span class='dlq'>DO, NH₃, pH, ঘোলাত্ব</span></li><li><span class='dlc'>বহিঃপরজীবী (আইক, আরগুলাস, ট্রাইকোডিনা) পরীক্ষা</span><span class='dlq'>কানকোর মাইক্রোস্কোপিক পরীক্ষা</span></li><li><span class='dlc'>মজুদ ঘনত্ব ও বায়ু সঞ্চালন মূল্যায়ন</span><span class='dlq'>ঘন মজুদ শ্লেষ্মা বাড়ায়</span></li></ul><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>৫–১০ গ্রা/লি · ১৫–২০ মিনিট</span></li><li><span class='dlc'>KMnO₄ স্নান — কানকো পরিষ্কার</span><span class='dlq'>৫–১০ মি.গ্রা/লি · ৩০ মিনিট</span></li><li><span class='dlc'>চুন — জলমান উন্নত করুন</span><span class='dlq'>১০–১৫ কেজি / বিঘা</span></li><li><span class='dlc'>বায়ু সঞ্চালন বাড়ান — চাপ কমান</span><span class='dlq'>DO &gt;৫ মি.গ্রা/লি</span></li></ul>`,
  te:`<div class='cause'><strong>జిగురు అంటే ఏమిటి:</strong> చేపలు చర్మం మరియు చెవులపై రక్షణ జిగురు (gel) పొర తయారుచేసుకుంటాయి. ఆరోగ్యకరమైన జిగురు = సన్నగా, పారదర్శకంగా. అధిక/అసాధారణ జిగురు = నీటి నాణ్యత సమస్యలు, పరాన్నజీవులు లేదా నిర్వహణ ఒత్తిడి యొక్క సంకేతం.</div><div class='symp'><span class='symp-head'>అసాధారణ జిగురు సంకేతాలు</span>చెవులపై దట్టమైన, మేఘావృతమైన లేదా గోధుమ రంగు జిగురు. నిర్వహించేటప్పుడు శరీరం నుండి అధికంగా జిగురు వలుస్తుంది. చెవులు జిగురుతో అడ్డుపడినట్లు కనిపిస్తాయి. చేపలు పైకి వచ్చి శ్వాస తీసుకుంటాయి.</div><div class='step'>పరిశోధన విధానం</div><ul class='dl'><li><span class='dlc'>ముందుగా నీటి నాణ్యత పరీక్షించండి</span><span class='dlq'>DO, NH₃, pH, నిగ్గుదనం</span></li><li><span class='dlc'>బయట పరాన్నజీవుల (ఇచ్, అర్గులస్, ట్రైకోడినా) పరీక్ష</span><span class='dlq'>మైక్రోస్కోప్ ద్వారా చెవి స్క్రేపింగ్ పరీక్ష</span></li><li><span class='dlc'>సాంద్రత మరియు గాలి సంచలనం మూల్యాంకనం</span><span class='dlq'>అధిక సాంద్రత జిగురు పెంచుతుంది</span></li></ul><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>NaCl ఉప్పు స్నానం</span><span class='dlq'>5–10 g/L · 15–20 నిమిషాలు</span></li><li><span class='dlc'>KMnO₄ స్నానం — చెవులు శుభ్రం</span><span class='dlq'>5–10 mg/L · 30 నిమిషాలు</span></li><li><span class='dlc'>సున్నం — నీటి నాణ్యత మెరుగుపరచండి</span><span class='dlq'>10–15 కి.గ్రా / బిఘా</span></li><li><span class='dlc'>గాలి సంచలనం పెంచండి</span><span class='dlq'>DO &gt;5 mg/L లక్ష్యంగా</span></li></ul>`
},
{
  id:'malnutrition', icon:'🌾', ac:'ac-green',
  tags:[{c:'tg2',t:{en:'NUTRITION',bn:'পুষ্টি',te:'పోషణ'}}],
  title:{en:'Malnutrition & Poor Growth',bn:'অপুষ্টি ও দুর্বল বৃদ্ধি',te:'తక్కువ తిండి, బలహీనంగా పెరగడం'},
  sub:{en:'Feed quality · FCR management · Species-wise targets',bn:'খাদ্যের মান · FCR · প্রজাতিভিত্তিক লক্ষ্যমাত্রা',te:'తినే నిష్పత్తి · జాతుల ప్రకారం పెరుగుదల లక్ష్యాలు'},
  en:`<div class='cause'><strong>Causes:</strong> Inadequate feed quantity, poor quality feed (low protein, rancid fat, aflatoxin), improper feed management (not checking trays, fixed schedules), species-specific deficiencies (Rohu needs more plant protein, Catla more zooplankton at fingerling stage), and competition for natural food organisms in polyculture.</div><div class='symp'><span class='symp-head'>Signs of Malnutrition</span>FCR &gt;2.5 for major carps (target &lt;1.8). Poor uniformity — large size variation between individuals (check trays: feed remaining = overfeeding; always empty = underfeeding). Pale/washed-out colour. Reduced immunity → increased disease incidence. Thin body profile, prominent vertebrae.</div><div class='step'>Feed Management Protocol</div><ul class='dl'><li><span class='dlc'>Protein content: 28–32% for fingerlings, 24–28% grow-out</span><span class='dlq'>Rohu needs 28%, Catla 26%, Mrigal 25%</span></li><li><span class='dlc'>Feed rate: 2–5% body weight/day</span><span class='dlq'>Adjust monthly based on sampling weight</span></li><li><span class='dlc'>Feed tray monitoring</span><span class='dlq'>Check trays 2 hours after feeding. Adjust accordingly.</span></li><li><span class='dlc'>Vitamin C supplementation</span><span class='dlq'>100–200 mg/kg feed · prevents scoliosis and improves immunity</span></li><li><span class='dlc'>Mineral premix</span><span class='dlq'>1–2% of feed · Ca, P, Zn, Mn balance</span></li></ul><div class='it'><span class='bh'>Natural Food Enhancement</span>Fortnightly organic manure (cow dung 20–25 kg/bigha) + chemical fertiliser (urea 2 kg + SSP 3 kg / bigha) maintains good phytoplankton and zooplankton bloom for Catla and Mrigal natural feeding.</div>`,
  bn:`<div class='cause'><strong>কারণ:</strong> অপর্যাপ্ত খাবার, নিম্নমানের খাবার (কম প্রোটিন, বাসি চর্বি, আফ্লাটক্সিন), অনুচিত খাবার ব্যবস্থাপনা (ট্রে না দেখা, নির্দিষ্ট সময়সূচি), প্রজাতি-নির্দিষ্ট ঘাটতি (রুই বেশি উদ্ভিদ প্রোটিন, কাতলা পোনা পর্যায়ে বেশি জুপ্ল্যাংকটন প্রয়োজন), এবং পলিকালচারে প্রাকৃতিক খাবারে প্রতিযোগিতা।</div><div class='symp'><span class='symp-head'>অপুষ্টির লক্ষণ</span>মেজর কার্পে FCR &gt;২.৫ (লক্ষ্য &lt;১.৮)। আকারে বড় পার্থক্য। ফ্যাকাশে রং। রোগ প্রতিরোধ কমে যায়। পাতলা শরীর।</div><div class='step'>খাবার ব্যবস্থাপনা প্রণালী</div><ul class='dl'><li><span class='dlc'>প্রোটিন: পোনায় ২৮–৩২%, বৃদ্ধি পর্যায়ে ২৪–২৮%</span><span class='dlq'>রুই ২৮%, কাতলা ২৬%, মৃগেল ২৫%</span></li><li><span class='dlc'>খাবারের হার: শরীরের ওজনের ২–৫%/দিন</span><span class='dlq'>মাসিক নমুনা ওজনের ভিত্তিতে সমন্বয়</span></li><li><span class='dlc'>খাবার ট্রে পর্যবেক্ষণ</span><span class='dlq'>দেওয়ার ২ ঘণ্টা পর ট্রে দেখুন। অনুযায়ী সমন্বয় করুন।</span></li><li><span class='dlc'>ভিটামিন C সম্পূরক</span><span class='dlq'>১০০–২০০ মি.গ্রা/কেজি খাবার</span></li><li><span class='dlc'>মিনারেল প্রিমিক্স</span><span class='dlq'>খাবারের ১–২%</span></li></ul><div class='it'><span class='bh'>প্রাকৃতিক খাদ্য বৃদ্ধি</span>পক্ষকালে জৈব সার (গোবর ২০–২৫ কেজি/বিঘা) + রাসায়নিক সার (ইউরিয়া ২ + এসএসপি ৩ কেজি/বিঘা) ফাইটোপ্ল্যাংকটন ও জুপ্ল্যাংকটন ব্লুম বজায় রাখে।</div>`,
  te:`<div class='cause'><strong>కారణాలు:</strong> తగిన ఆహారం లేకపోవడం, నిమ్న నాణ్యత ఆహారం (తక్కువ ప్రోటీన్, పాతపడిన కొవ్వు, అఫ్లాటాక్సిన్), సరైన ఆహార నిర్వహణ లేకపోవడం (ట్రేలు చూడకపోవడం), జాతి-నిర్దిష్ట లోపాలు (రోహుకు ఎక్కువ మొక్కల ప్రోటీన్ అవసరం) మరియు పాలీకల్చర్‌లో సహజ ఆహారానికి పోటీ.</div><div class='symp'><span class='symp-head'>పోషకాహార లోపం సంకేతాలు</span>మేజర్ కార్ప్‌లలో FCR &gt;2.5 (లక్ష్యం &lt;1.8). వ్యక్తుల మధ్య పెద్ద పరిమాణ వ్యత్యాసం. లేత/తేలిపోయిన రంగు. రోగనిరోధకత తగ్గడం. సన్నని శరీర ఆకృతి.</div><div class='step'>ఆహార నిర్వహణ విధానం</div><ul class='dl'><li><span class='dlc'>ప్రోటీన్: పిల్లలకు 28–32%, పెద్ద చేపలకు 24–28%</span><span class='dlq'>రోహు 28%, కట్లా 26%, మృగల్ 25%</span></li><li><span class='dlc'>ఆహారం రేటు: శరీర బరువులో 2–5%/రోజు</span><span class='dlq'>నెలవారీ నమూనా బరువు ఆధారంగా సర్దుబాటు</span></li><li><span class='dlc'>ఆహారపు ట్రే పర్యవేక్షణ</span><span class='dlq'>వేసిన 2 గంటల తర్వాత ట్రేలు తనిఖీ చేయండి.</span></li><li><span class='dlc'>విటమిన్ C అనుబంధం</span><span class='dlq'>100–200 mg/kg ఆహారం</span></li><li><span class='dlc'>మినరల్ ప్రీమిక్స్</span><span class='dlq'>ఆహారంలో 1–2%</span></li></ul><div class='it'><span class='bh'>సహజ ఆహారం మెరుగుదల</span>పక్షానికోసారి సేంద్రీయ ఎరువు (ఆవు పేడ 20–25 కి.గ్రా/బిఘా) + రసాయన ఎరువు (యూరియా 2 + SSP 3 కి.గ్రా/బిఘా) ఫైటోప్లాంక్టన్ మరియు జూప్లాంక్టన్ బ్లూమ్ నిర్వహిస్తుంది.</div>`
},
{
  id:'saprolegnia', icon:'🍄', ac:'ac-gold',
  tags:[{c:'tf',t:{en:'FUNGAL',bn:'ছত্রাক',te:'శిలీంధ్ర రోగం'}}],
  title:{en:'Fish Hard — Saprolegnia (Water Mould)',bn:'ফিশ হার্ড — স্যাপ্রোলেগনিয়া (জলের ছত্রাক)',te:'Fish Hard — నీటి పుట్టగొడుగు రోగం (Saprolegnia)'},
  sub:{en:'Cotton-wool white growth · Cold water peak · Injury trigger',bn:'সাদা তুলার মতো বৃদ্ধি · ঠান্ডা জলে সবচেয়ে বেশি',te:'తెల్లని పత్తి లాంటి పెరుగుదల · చల్లని నీటిలో ఎక్కువ'},
  en:`<div class='cause'><strong>Causative Agent:</strong> Saprolegnia parasitica, S. diclina (water moulds/oomycetes). Secondary infection — always follows injury, stress, or another disease (especially EUS ulcers). Thrives in cold water (15–20°C). Peak: November–February. NOT a primary pathogen — indicates underlying problem.</div><div class='symp'><span class='symp-head'>Symptoms</span>White or grey cotton-wool growth on skin, fins, or gills. Most common around wounds, ulcers, or sites of mechanical injury. Appears as fluffy hyphae mass. Fish lethargic. Secondary bacterial infection follows rapidly.</div><div class='step'>Treatment</div><ul class='dl'><li><span class='dlc'>Salt (NaCl) bath</span><span class='dlq'>10–15 g/L · 10–15 min · daily until resolved</span><span class='dln'>Most practical field treatment. Salt dehydrates fungal hyphae osmotically.</span></li><li><span class='dlc'>KMnO₄ bath</span><span class='dlq'>10–15 mg/L · 30 min</span></li><li><span class='dlc'>KMnO₄ pond treatment</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>Formalin bath</span><span class='dlq'>100–150 mg/L · 30–60 min</span></li></ul><div class='step'>Critical: Treat the Underlying Cause</div><ul class='dl'><li><span class='dlc'>Address EUS or bacterial ulcers first</span><span class='dlq'>Saprolegnia will return if primary cause not treated</span></li><li><span class='dlc'>Improve water quality — raise DO &gt;5 mg/L</span><span class='dlq'>Stress = susceptibility</span></li><li><span class='dlc'>Handle fish gently — prevent injuries</span><span class='dlq'>Any skin break = Saprolegnia entry point</span></li></ul><div class='it'><span class='bh'>Key Point</span>Saprolegnia is a saprophyte — it attacks weakened/injured tissue. If recurrent, investigate the primary problem (EUS, water quality, overcrowding) rather than repeating fungal treatment alone.</div>`,
  bn:`<div class='cause'><strong>কারণকারী জীবাণু:</strong> স্যাপ্রোলেগনিয়া প্যারাসিটিকা, এস. ডাইক্লিনা (জলের ছত্রাক/ওমাইসেট)। সেকেন্ডারি সংক্রমণ — সর্বদা আঘাত, চাপ বা অন্য রোগের পরে (বিশেষত EUS ক্ষত)। ঠান্ডা জলে (১৫–২০°C) বাড়ে। নভেম্বর–ফেব্রুয়ারিতে সবচেয়ে বেশি।</div><div class='symp'><span class='symp-head'>লক্ষণ</span>ত্বকে, পাখনায় বা কানকোতে সাদা বা ধূসর তুলার মতো বৃদ্ধি। আঘাত বা ক্ষতের চারপাশে সবচেয়ে বেশি দেখা যায়। ঝিমুনি। দ্রুত সেকেন্ডারি ব্যাকটেরিয়া সংক্রমণ হয়।</div><div class='step'>চিকিৎসা</div><ul class='dl'><li><span class='dlc'>NaCl লবণ স্নান</span><span class='dlq'>১০–১৫ গ্রা/লি · ১০–১৫ মিনিট · সমাধান না হওয়া পর্যন্ত প্রতিদিন</span><span class='dln'>সবচেয়ে ব্যবহারিক মাঠ চিকিৎসা। লবণ অসমোটিক্যালি ছত্রাকের হাইফা শুকিয়ে দেয়।</span></li><li><span class='dlc'>KMnO₄ স্নান</span><span class='dlq'>১০–১৫ মি.গ্রা/লি · ৩০ মিনিট</span></li><li><span class='dlc'>KMnO₄ পুকুরে প্রয়োগ</span><span class='dlq'>২–৩ মি.গ্রা/লি</span></li><li><span class='dlc'>ফর্মালিন স্নান</span><span class='dlq'>১০০–১৫০ মি.গ্রা/লি · ৩০–৬০ মিনিট</span></li></ul><div class='step'>গুরুত্বপূর্ণ: মূল কারণ চিকিৎসা করুন</div><ul class='dl'><li><span class='dlc'>প্রথমে EUS বা ব্যাকটেরিয়াল ক্ষত চিকিৎসা করুন</span><span class='dlq'>মূল কারণ না সারালে স্যাপ্রোলেগনিয়া ফিরে আসবে</span></li><li><span class='dlc'>DO &gt;৫ মি.গ্রা/লি বজায় রাখুন</span><span class='dlq'>চাপ = সংবেদনশীলতা</span></li></ul><div class='it'><span class='bh'>মূল বিষয়</span>স্যাপ্রোলেগনিয়া একটি পচনশীল জীব — দুর্বল/আহত টিস্যু আক্রমণ করে। বারবার হলে মূল কারণ (EUS, জলমান, ঘন মজুদ) অনুসন্ধান করুন।</div>`,
  te:`<div class='cause'><strong>రోగం ఎలా వస్తుంది:</strong> సాప్రోలెగ్నియా పారాసిటికా, ఎస్. డైక్లినా (నీటి పుట్టగొడుగులు/ఒమైసెట్లు). ద్వితీయ సంక్రమణ — ఎల్లప్పుడూ గాయం, ఒత్తిడి లేదా మరొక వ్యాధి (ముఖ్యంగా EUS పుళ్ళు) తర్వాత వస్తుంది. చల్లని నీటిలో (15–20°C) పెరుగుతుంది. నవంబర్–ఫిబ్రవరిలో ఎక్కువ.</div><div class='symp'><span class='symp-head'>లక్షణాలు</span>చర్మంపై, రెక్కలపై లేదా చెవులపై తెల్లని లేదా బూడిద రంగు పత్తి లాంటి పెరుగుదల. గాయాల లేదా పుళ్ళ చుట్టూ అత్యంత సాధారణం. మత్తుగా ఉండటం. తర్వాత వేగంగా బాక్టీరియా సంక్రమణ వస్తుంది.</div><div class='step'>చికిత్స</div><ul class='dl'><li><span class='dlc'>NaCl ఉప్పు స్నానం</span><span class='dlq'>10–15 g/L · 10–15 నిమి · పరిష్కారమయ్యేంత వరకు రోజూ</span><span class='dln'>అత్యంత ఆచరణాత్మక క్షేత్ర చికిత్స. ఉప్పు ఆస్మోటిక్ గా శిలీంధ్ర హైఫాను ఆరబెడుతుంది.</span></li><li><span class='dlc'>KMnO₄ స్నానం</span><span class='dlq'>10–15 mg/L · 30 నిమిషాలు</span></li><li><span class='dlc'>KMnO₄ చెరువులో</span><span class='dlq'>2–3 mg/L</span></li><li><span class='dlc'>ఫార్మాలిన్ స్నానం</span><span class='dlq'>100–150 mg/L · 30–60 నిమిషాలు</span></li></ul><div class='step'>ముఖ్యమైనది: అంతర్లీన కారణాన్ని చికిత్స చేయండి</div><ul class='dl'><li><span class='dlc'>ముందుగా EUS లేదా బాక్టీరియా పుళ్ళు చికిత్స చేయండి</span><span class='dlq'>మూల కారణం సరిదిద్దకుంటే సాప్రోలెగ్నియా తిరిగి వస్తుంది</span></li><li><span class='dlc'>DO &gt;5 mg/L నిర్వహించండి</span><span class='dlq'>ఒత్తిడి = సున్నితత్వం</span></li></ul><div class='it'><span class='bh'>కీలక విషయం</span>సాప్రోలెగ్నియా బలహీన/గాయపడిన కణజాలాన్ని మాత్రమే దాడి చేస్తుంది. పదే పదే వస్తే మూల కారణం (EUS, నీటి నాణ్యత, అధిక సాంద్రత) పరిశోధించండి.</div>`
}
];

  try{ localStorage.setItem('imcl',l); }catch(e){}
  renderList(document.getElementById('srch').value||'');
  if(CID){ openDetail(CID); }
}

function renderList(q) {
  var sq = (q||'').toLowerCase().trim();
  var html = '', n = 0;
  for(var i=0; i<D.length; i++){
    var c = D[i];
    var tl = LANG==='bn'?c.title.bn:LANG==='te'?c.title.te:c.title.en;
    var sl = LANG==='bn'?c.sub.bn:LANG==='te'?c.sub.te:c.sub.en;
    var match = !sq
      || c.title.en.toLowerCase().indexOf(sq)>=0
      || c.sub.en.toLowerCase().indexOf(sq)>=0
      || (c.title.bn && c.title.bn.indexOf(sq)>=0)
      || (c.title.te && c.title.te.indexOf(sq)>=0)
      || c.id.indexOf(sq)>=0;
    if(!match) continue;
    n++;
    var tgtxt = LANG==='bn'?c.tags[0].t.bn:LANG==='te'?c.tags[0].t.te:c.tags[0].t.en;
    html += '<div class="card '+c.ac+'" data-id="'+c.id+'">'
      + '<div class="ci">'+c.icon+'</div>'
      + '<div class="cb">'
        + '<div class="ct">'+tl+'</div>'
        + '<div class="cs">'+sl+'</div>'
        + '<div class="ctg"><span class="tg '+c.tags[0].c+'">'+tgtxt+'</span></div>'
      + '</div>'
      + '<div class="ca">›</div>'
    + '</div>';
  }
  var listEl = document.getElementById('list');
  listEl.innerHTML = html + '<div id="nores"'+(n?'':' style="display:block"')+'>🔎 No results</div>';
  listEl.onclick = function(e){
    var el = e.target;
    while(el && el !== listEl){
      if(el.getAttribute && el.getAttribute('data-id')){ openDetail(el.getAttribute('data-id')); return; }
      el = el.parentElement;
    }
  };
}

function openDetail(id) {
  var c = ALL[id]; if(!c) return;
  CID = id;
  var tl = LANG==='bn'?c.title.bn:LANG==='te'?c.title.te:c.title.en;
  var sl = LANG==='bn'?c.sub.bn:LANG==='te'?c.sub.te:c.sub.en;
  var bl = LANG==='bn'?c.bn:LANG==='te'?c.te:c.en;
  document.getElementById('dico').textContent = c.icon;
  document.getElementById('dtit').textContent = tl;
  document.getElementById('dsub').textContent = sl;
  document.getElementById('dbody').innerHTML = bl;
  document.getElementById('dscr').scrollTop = 0;
  var d = document.getElementById('det');
  d.classList.remove('open');
  void d.offsetWidth;
  d.classList.add('open');
}

function closeDetail() {
  document.getElementById('det').classList.remove('open');
  CID = null;
}

// Events
document.querySelectorAll('.lb').forEach(function(b){
  b.addEventListener('click', function(){ setLang(b.getAttribute('data-l')); });
});
document.getElementById('back').addEventListener('click', closeDetail);
document.getElementById('srch').addEventListener('input', function(e){ renderList(e.target.value); });

// Swipe right to close
var det = document.getElementById('det');
det.addEventListener('touchstart', function(e){ TX = e.touches[0].clientX; }, {passive:true});
det.addEventListener('touchend', function(e){
  if(e.changedTouches[0].clientX - TX > 70 && TX < 50) closeDetail();
}, {passive:true});

// Init
(function(){
  var l='en';
  try{ l=localStorage.getItem('imcl')||'en'; }catch(e){}
  setLang(l);
  renderList('');
})();
</script>
